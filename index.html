<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sanpath">
<title>Sanpath</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{--g:#4ade80;--bg:#111;--c1:#1a1a1a;--c2:#222;--bd:#333;--tx:#ddd;--dm:#666;--fg:#fff}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Helvetica Neue',Helvetica,sans-serif;background:var(--bg);color:var(--tx);height:100dvh;width:100vw;overflow:hidden}
#map{position:absolute;inset:0;z-index:1}
#hud{position:absolute;top:0;left:0;right:0;z-index:800;pointer-events:none;padding-top:max(env(safe-area-inset-top,6px),6px);text-align:center;opacity:0;transition:opacity .3s}
#hud.on{opacity:1}
#h-dir{font-size:36px;font-weight:200;letter-spacing:.05em;color:var(--fg);line-height:1}
#h-sub{font-size:11px;color:var(--dm);margin-top:2px;font-weight:500;letter-spacing:.08em}
#gps{position:absolute;top:max(env(safe-area-inset-top,4px),4px);right:8px;z-index:810;font-size:9px;font-weight:600;color:var(--dm);letter-spacing:.05em;display:none;pointer-events:none}
#gps-dot{width:5px;height:5px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:3px}
#bgb{position:absolute;top:max(env(safe-area-inset-top,4px),4px);left:8px;z-index:810;font-size:8px;font-weight:600;color:var(--g);letter-spacing:.06em;display:none;pointer-events:none}
#toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1500;background:#000;border:1px solid var(--bd);padding:10px 24px;border-radius:4px;font-size:12px;font-weight:500;letter-spacing:.04em;color:var(--tx);opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap}
#toast.show{opacity:.9}
#bar{position:absolute;bottom:0;left:0;right:0;z-index:900;background:var(--c1);border-top:1px solid #222;padding-bottom:calc(max(env(safe-area-inset-bottom,4px),4px) + 2px)}
#stats{display:none;justify-content:center;gap:24px;padding:10px 0 6px;border-bottom:1px solid #222}
.st{text-align:center}.st-v{font-size:22px;font-weight:300;color:var(--fg);letter-spacing:.02em}.st-l{font-size:8px;font-weight:600;color:var(--dm);letter-spacing:.12em;margin-top:1px}
#ctrl{display:flex;justify-content:center;align-items:center;gap:6px;padding:8px 12px}
.cb{height:40px;border:1px solid var(--bd);border-radius:4px;background:transparent;color:var(--tx);font-size:13px;font-weight:600;letter-spacing:.06em;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center;padding:0 16px}
.cb:active{transform:scale(.95);background:var(--c2)}
.cb.stop{border-color:#c44;color:#c44;display:none}
.cb.icon{width:40px;padding:0;font-size:15px;flex-shrink:0}
.cb.icon.von{border-color:var(--g);color:var(--g)}
#tiles,.tiles-row{display:flex;justify-content:center;gap:3px;padding:4px 8px}
.tb{font-size:8px;font-weight:700;letter-spacing:.1em;padding:3px 8px;border:1px solid transparent;border-radius:2px;background:transparent;color:var(--dm);cursor:pointer;text-transform:uppercase}
.tb.on{color:var(--g);border-color:var(--bd)}
#b-c{position:absolute;right:10px;z-index:810;width:36px;height:36px;border-radius:4px;border:1px solid var(--bd);background:rgba(17,17,17,.85);color:var(--dm);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;pointer-events:auto}
#b-c:active{background:var(--c2);color:var(--g)}

/* ── History panel ── */
#hist{position:absolute;inset:0;z-index:1800;background:var(--bg);transform:translateY(100%);transition:transform .3s;overflow:hidden}
#hist.open{transform:translateY(0)}
#hist-list{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
#hist-det{position:absolute;inset:0;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateX(100%);transition:transform .25s}
#hist-det.open{transform:translateX(0)}
.hh{position:sticky;top:0;background:var(--bg);padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;z-index:10}
.hh-t{font-size:14px;font-weight:600;letter-spacing:.06em}
.hh-x{font-size:18px;color:var(--dm);cursor:pointer;padding:4px 8px}
.hh-back{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--g);cursor:pointer;padding:4px 0;min-width:60px}
.he{text-align:center;padding:60px 20px;color:var(--dm);font-size:11px}
.hc{margin:8px 10px;padding:12px;border:1px solid var(--bd);border-radius:4px;cursor:pointer;display:flex;flex-direction:column;gap:4px}
.hc:active{background:var(--c2)}
.hc-top{display:flex;justify-content:space-between;align-items:center}
.hc-date{font-size:10px;color:var(--dm);font-weight:600;letter-spacing:.05em}
.hc-tag{font-size:8px;font-weight:700;letter-spacing:.1em;padding:1px 5px;border:1px solid var(--bd);border-radius:2px}
.hc-tag.r{color:var(--g);border-color:rgba(74,222,128,.3)}.hc-tag.w{color:var(--dm)}
.hc-del{font-size:12px;color:var(--dm);cursor:pointer;padding:2px 6px;margin-left:8px}
.hc-s{font-size:12px;color:var(--tx);letter-spacing:.03em}.hc-s b{color:var(--g);font-weight:500}
.hc-row{display:flex;align-items:center;justify-content:space-between}
.hc-arr{font-size:16px;color:var(--dm)}

/* ── History detail ── */
#hd-map{height:220px;background:#1a1a1a;flex-shrink:0}
#hd-info{padding:12px 10px 8px}
#hd-ctrl{padding:0 10px 10px;display:flex;gap:8px}
#hd-memo{width:calc(100% - 20px);margin:0 10px 16px;background:var(--c2);border:1px solid var(--bd);border-radius:2px;padding:6px 8px;color:var(--tx);font-size:10px;font-family:inherit;resize:vertical;min-height:32px;display:block}
#hd-memo::placeholder{color:var(--dm)}

/* ── Loading ── */
#ld{position:absolute;inset:0;z-index:2000;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity .4s}
#ld.gone{opacity:0;pointer-events:none}
.sp{width:2px;height:2px;background:var(--g);border-radius:50%;box-shadow:12px 0 0 var(--g),-12px 0 0 var(--g);animation:ld .8s ease infinite alternate}
@keyframes ld{to{box-shadow:12px 0 0 var(--dm),-12px 0 0 var(--dm)}}
#lt{font-size:11px;color:var(--dm);text-align:center;letter-spacing:.06em;line-height:1.7}
.lr{margin-top:10px;font-size:9px;color:#555;letter-spacing:.04em;text-align:center;max-width:260px;line-height:1.6}
.lb{font-size:11px;font-weight:600;letter-spacing:.06em;padding:8px 24px;border:1px solid var(--g);border-radius:2px;background:transparent;color:var(--g);cursor:pointer;margin-top:10px}
.lb2{font-size:10px;letter-spacing:.06em;padding:6px 18px;border:1px solid var(--bd);border-radius:2px;background:transparent;color:var(--dm);cursor:pointer;margin-top:6px}
#tap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:810;pointer-events:none;display:none;font-size:11px;color:var(--dm);letter-spacing:.1em;border:1px solid var(--bd);padding:8px 16px;border-radius:2px;background:rgba(0,0,0,.8)}
.leaflet-control-attribution{font-size:7px!important;opacity:.5}
.jn{width:12px;height:12px;border-radius:50%;background:var(--g);border:2px solid var(--fg);box-shadow:0 0 6px rgba(74,222,128,.4)}

/* ── マップ閲覧バー (SHOW ON MAP モード) ── */
#map-hist-bar{position:absolute;bottom:0;left:0;right:0;z-index:900;background:var(--c1);border-top:1px solid #222;padding-bottom:calc(max(env(safe-area-inset-bottom,4px),4px) + 2px);display:none}
#map-hist-ctrl{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 12px}
#map-hist-info{font-size:10px;color:var(--dm);letter-spacing:.05em;font-weight:600;flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style>
</head>
<body>
<div id="ld"><div class="sp"></div><div id="lt">...</div></div>
<div id="map"></div>
<div id="gps"><span id="gps-dot"></span><span id="gps-t"></span></div>
<div id="bgb">BG</div>
<button id="b-c" title="center">+</button>
<div id="hud"><div id="h-dir"></div><div id="h-sub"></div></div>
<div id="toast"></div>
<div id="tap">TAP TO SET POSITION</div>

<!-- ── 履歴パネル ── -->
<div id="hist">
  <!-- 一覧ビュー -->
  <div id="hist-list">
    <div class="hh">
      <span class="hh-t">LOG</span>
      <span class="hh-x" id="hx">&times;</span>
    </div>
    <div id="hl"></div>
  </div>
  <!-- 詳細ビュー -->
  <div id="hist-det">
    <div class="hh">
      <span class="hh-back" id="hd-back">← LIST</span>
      <span class="hh-t" id="hd-title"></span>
      <span style="min-width:60px"></span>
    </div>
    <div id="hd-map"></div>
    <div id="hd-info"></div>
    <div id="hd-ctrl">
      <button class="cb icon" id="hd-hm" title="speed heatmap">~</button>
      <button class="cb" id="hd-showmap">SHOW ON MAP</button>
    </div>
    <textarea id="hd-memo" placeholder="memo"></textarea>
  </div>
</div>

<!-- ── マップ閲覧バー: SHOW ON MAP モード時のみ表示 ── -->
<div id="map-hist-bar">
  <div id="map-hist-ctrl">
    <button class="cb" id="map-hist-back-btn" style="flex-shrink:0;padding:0 12px">← LOG</button>
    <span id="map-hist-info"></span>
    <button class="cb icon" id="map-hist-hm-btn" title="speed heatmap">~</button>
    <button class="cb icon" id="map-hist-log-btn" title="log">&equiv;</button>
  </div>
  <div class="tiles-row">
    <div class="tb on" data-t="std">STD</div>
    <div class="tb" data-t="dark">DARK</div>
    <div class="tb" data-t="sat">SAT</div>
    <div class="tb" data-t="pale">PALE</div>
  </div>
</div>

<div id="bar">
  <div id="stats">
    <div class="st"><div class="st-v" id="s-d">0</div><div class="st-l">M</div></div>
    <div class="st"><div class="st-v" id="s-t">0:00</div><div class="st-l">TIME</div></div>
    <div class="st"><div class="st-v" id="s-j">0</div><div class="st-l">JCT</div></div>
    <div class="st"><div class="st-v" id="s-sp">-</div><div class="st-l">KM/H</div></div>
  </div>
  <div id="ctrl">
    <button class="cb icon" id="b-v" title="voice">V</button>
    <button class="cb" id="b-r">? RAND</button>
    <button class="cb" id="b-w">+ REC</button>
    <button class="cb stop" id="b-s">STOP</button>
    <button class="cb icon" id="b-sc" title="speed color">~</button>
    <button class="cb icon" id="b-h" title="log">&equiv;</button>
  </div>
  <div id="tiles">
    <div class="tb on" data-t="std">STD</div>
    <div class="tb" data-t="dark">DARK</div>
    <div class="tb" data-t="sat">SAT</div>
    <div class="tb" data-t="pale">PALE</div>
  </div>
</div>

<script>
const{sin,cos,atan2,sqrt,PI,floor,round,min,max,random:rnd}=Math,toR=d=>d*PI/180,$=id=>document.getElementById(id);
function hav(a1,o1,a2,o2){const R=6371e3,dA=toR(a2-a1),dO=toR(o2-o1),a=sin(dA/2)**2+cos(toR(a1))*cos(toR(a2))*sin(dO/2)**2;return R*2*atan2(sqrt(a),sqrt(1-a))}
function bear(a1,o1,a2,o2){const dO=toR(o2-o1);return(atan2(sin(dO)*cos(toR(a2)),cos(toR(a1))*sin(toR(a2))-sin(toR(a1))*cos(toR(a2))*cos(dO))*180/PI+360)%360}
const DA=['N','NE','E','SE','S','SW','W','NW'],AR=['\u2191','\u2197','\u2192','\u2198','\u2193','\u2199','\u2190','\u2196'];
function bD(b){const i=round(b/45)%8;return{a:AR[i],n:DA[i],i}}
function d2p(lat,lon,co){if(!co||co.length<2)return 1e9;let m=1e9;for(let i=0;i<co.length-1;i++){const a=co[i],b=co[i+1],dx=b.lat-a.lat,dy=b.lon-a.lon,l2=dx*dx+dy*dy;let t=l2?((lat-a.lat)*dx+(lon-a.lon)*dy)/l2:0;t=max(0,min(1,t));m=min(m,hav(lat,lon,a.lat+t*dx,a.lon+t*dy))}return m}
function fT(s){return`${floor(s/60)}:${(s%60).toString().padStart(2,'0')}`}
function toast(m){const e=$('toast');e.textContent=m;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),2500)}

// 速度→色: 0km/h=青 → 4km/h=緑 → 8+km/h=赤
function spd2col(kmh){const t=min(kmh/8,1);if(t<.5){const r=floor(t*2*255),g=255,b=floor((1-t*2)*200);return`rgb(${r},${g},${b})`}const r=255,g=floor((1-(t-.5)*2)*255);return`rgb(${r},${g},0)`}

// ── Voice ──
const V={on:false,m:'off',sy:window.speechSynthesis,jv:null,ev:null,ctx:null,
init(){if(!this.sy)return;const f=()=>{const v=this.sy.getVoices();this.jv=v.find(x=>x.lang.startsWith('ja'));this.ev=v.find(x=>x.lang.startsWith('en')&&x.localService)||v.find(x=>x.lang.startsWith('en'))};f();if(this.sy)this.sy.onvoiceschanged=f},
enable(){this.on=true;this.init();this.m=this.jv?'ja':this.ev?'en':this.sy?.getVoices().length?'ja':'beep';return this.m},
disable(){this.on=false;this.m='off';this.sy?.cancel()},
say(ja,en){if(!this.on)return;if(this.m==='beep'){this.beep();return}
if(!this.sy)return;if(this.sy.paused)this.sy.resume();this.sy.cancel();
const u=new SpeechSynthesisUtterance(this.m==='ja'?ja:en);u.lang=this.m==='ja'?'ja-JP':'en-US';
const v=this.m==='ja'?this.jv:this.ev;if(v)u.voice=v;u.rate=1.1;u.volume=1;this.sy.speak(u);
const ri=setInterval(()=>{if(this.sy.paused)this.sy.resume();if(!this.sy.speaking)clearInterval(ri)},300);setTimeout(()=>clearInterval(ri),8000)},
beep(){try{if(!this.ctx)this.ctx=new(window.AudioContext||window.webkitAudioContext)();if(this.ctx.state==='suspended')this.ctx.resume();const c=this.ctx,n=c.currentTime,b=(f,s,d)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.setValueAtTime(.2,n+s);g.gain.exponentialRampToValueAtTime(.01,n+s+d);o.start(n+s);o.stop(n+s+d)};b(600,0,.1);b(800,.12,.15)}catch(e){}}
};V.init();

// ── BG keep-alive ──
const BG={wl:null,au:null,ctx:null,osc:null,active:false,notif:false,gps:null,gpsFast:null,
async acquire(){if(this.active)return;this.active=true;
if('wakeLock' in navigator)try{this.wl=await navigator.wakeLock.request('screen');$('bgb').style.display=''}catch(e){}
document.addEventListener('visibilitychange',this._vc=async()=>{
  if(document.visibilityState==='visible'&&this.active){
    if('wakeLock' in navigator&&!this.wl)try{this.wl=await navigator.wakeLock.request('screen');$('bgb').style.display=''}catch(e){}
    if(this.ctx?.state==='suspended')this.ctx.resume();
    if(this.au?.paused)try{await this.au.play()}catch(e){}
    // フォアグラウンド復帰時: watcherを再アタッチして即座に位置取得
    if(A.wid!==null){
      navigator.geolocation.clearWatch(A.wid);
      A.wid=navigator.geolocation.watchPosition(p=>onPos(p.coords.latitude,p.coords.longitude,p.coords.accuracy),()=>{},{enableHighAccuracy:true,maximumAge:1000,timeout:10000});
    }
    // 即時位置取得でギャップを埋める
    navigator.geolocation.getCurrentPosition(
      p=>onPos(p.coords.latitude,p.coords.longitude,p.coords.accuracy),
      ()=>{},{enableHighAccuracy:true,maximumAge:0,timeout:8000});
  } else if(document.visibilityState==='hidden'&&this.active){
    navigator.geolocation.getCurrentPosition(
      p=>onPos(p.coords.latitude,p.coords.longitude,p.coords.accuracy),
      ()=>{},{enableHighAccuracy:true,maximumAge:0,timeout:8000});
  }
});
try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();this.osc=this.ctx.createOscillator();this.osc.frequency.value=1;const g=this.ctx.createGain();g.gain.value=.01;const sd=this.ctx.createMediaStreamDestination();this.osc.connect(g);g.connect(sd);const sg=this.ctx.createGain();sg.gain.value=.001;this.osc.connect(sg);sg.connect(this.ctx.destination);this.osc.start();this.au=document.createElement('audio');this.au.srcObject=sd.stream;this.au.loop=true;this.au.volume=.01;await this.au.play()}catch(e){}
// GPS polling: 2s主・8sバックアップ
this.gpsFast=setInterval(()=>{if(!this.active)return;navigator.geolocation.getCurrentPosition(p=>onPos(p.coords.latitude,p.coords.longitude,p.coords.accuracy),()=>{},{enableHighAccuracy:true,maximumAge:1500,timeout:5000})},2000);
this.gps=setInterval(()=>{if(!this.active)return;navigator.geolocation.getCurrentPosition(p=>onPos(p.coords.latitude,p.coords.longitude,p.coords.accuracy),()=>{},{enableHighAccuracy:true,maximumAge:3000,timeout:8000})},8000);
if('mediaSession' in navigator){navigator.mediaSession.metadata=new MediaMetadata({title:'Sanpath',artist:'walking...'});try{navigator.mediaSession.setActionHandler('pause',()=>{navigator.mediaSession.playbackState='playing'})}catch(e){}}
if('Notification' in window){if(Notification.permission==='default')try{this.notif=(await Notification.requestPermission())==='granted'}catch(e){}else this.notif=Notification.permission==='granted'}},
release(){this.active=false;if(this.gps){clearInterval(this.gps);this.gps=null}if(this.gpsFast){clearInterval(this.gpsFast);this.gpsFast=null}
if(this.wl)try{this.wl.release()}catch(e){}this.wl=null;
if(this.au){this.au.pause();this.au.srcObject=null;this.au=null}
if(this.osc)try{this.osc.stop()}catch(e){}if(this.ctx)try{this.ctx.close()}catch(e){}this.ctx=this.osc=null;
if(this._vc)document.removeEventListener('visibilitychange',this._vc);
if('mediaSession' in navigator)try{navigator.mediaSession.metadata=null}catch(e){}$('bgb').style.display='none'},
ms(t){if('mediaSession' in navigator)try{navigator.mediaSession.metadata=new MediaMetadata({title:t,artist:'Sanpath'})}catch(e){}},
notify(t,b){if(!this.notif)return;try{const n=new Notification(t,{body:b,tag:'w',vibrate:[200,100,200]});setTimeout(()=>n.close(),5000)}catch(e){}},
vib(p){if('vibrate' in navigator)try{navigator.vibrate(p)}catch(e){}}};

// ── GPS filter ──
class KF{constructor(){this.lat=null;this.lon=null;this.v=-1;this.t=0}
upd(lat,lon,a,ts){a=max(a,3);if(this.v<0){this.lat=lat;this.lon=lon;this.v=a*a;this.t=ts;return{lat,lon}}const dt=(ts-this.t)/1000;if(dt>0){this.v+=dt*2.25;this.t=ts}const K=this.v/(this.v+a*a);this.lat+=K*(lat-this.lat);this.lon+=K*(lon-this.lon);this.v*=(1-K);return{lat:this.lat,lon:this.lon}}}
class SD{constructor(){this.b=[];this.mx=15}add(lat,lon,t){this.b.push({lat,lon,t});if(this.b.length>this.mx)this.b.shift()}
mov(){if(this.b.length<4)return false;const f=this.b[0],l=this.b[this.b.length-1],d=hav(f.lat,f.lon,l.lat,l.lon),dt=(l.t-f.t)/1000;return dt>2&&d/dt>.8&&d>5}}

// ── Road graph ──
class G{constructor(){this.N=new Map;this.A=new Map;this.WN=new Map;this.NW=new Map;this.IX=new Set;this.S=[]}
load(d){for(const e of d.elements||[])if(e.type==='node')this.N.set(e.id,{lat:e.lat,lon:e.lon});
for(const e of d.elements||[]){if(e.type!=='way'||!e.nodes)continue;const ns=e.nodes;this.WN.set(e.id,ns);for(let i=0;i<ns.length;i++){const n=ns[i];if(!this.NW.has(n))this.NW.set(n,new Set);this.NW.get(n).add(e.id);if(!this.A.has(n))this.A.set(n,new Set);if(i>0){this.A.get(n).add(ns[i-1]);if(!this.A.has(ns[i-1]))this.A.set(ns[i-1],new Set);this.A.get(ns[i-1]).add(n)}}}
for(const[n,nb]of this.A)if(nb.size>=3||nb.size===1)this.IX.add(n);for(const[n,w]of this.NW)if(w.size>=2&&this.A.has(n))this.IX.add(n);

// ── Rand routing ──

function goS(seg){A.cs=seg;A.cf=A.ci;A.ti=seg.t;A.jc++;A.swd=0;A.lat=Date.now();A.aa=false;$('s-j').textContent=A.jc;
if(A.pl)A.map.removeLayer(A.pl);A.pl=L.polyline(seg.co.map(c=>[c.lat,c.lon]),{color:'#4ade80',weight:3,opacity:.5,dashArray:'6,5'}).addTo(A.map);
if(A.nm)A.map.removeLayer(A.nm);const tn=A.g.N.get(seg.t);if(tn){const ic=L.divIcon({className:'',html:'<div class="jn"></div>',iconSize:[12,12],iconAnchor:[6,6]});A.nm=L.marker([tn.lat,tn.lon],{icon:ic}).addTo(A.map)}
uDir();const sn=A.g.N.get(seg.f),np=seg.co.length>1?seg.co[1]:A.g.N.get(seg.t);
if(sn&&np){const d=bD(bear(sn.lat,sn.lon,np.lat,np.lon));V.say(`${d.n} ${seg.d}m`,`${d.n} ${seg.d}m`);BG.ms(`${d.a} ${d.n} ${seg.d}m`);BG.notify(d.a+' '+d.n,seg.d+'m');BG.vib([80,40,80,40,160])}
if(A.sim||A.manual)startSim(seg)}
function onA(now){A.vis.add(A.ti);mV(A.ti);V.say('JCT','Arrived');BG.vib([80,60,80,60,200]);
[A.pl,A.nm,A.npl,A.nnm].forEach(x=>{if(x)A.map.removeLayer(x)});A.pl=A.nm=A.npl=A.nnm=null;
A.ci=A.ti;A.lat=now;const s=A.ns||pick(A.ci,A.cf);A.ns=null;if(!s){toast('ALL EXPLORED');stop();return}goS(s);preC()}
function onD(nid,now){A.vis.add(nid);mV(nid);V.say('REROUTE','Recalculating');BG.vib([200,80,200]);

A.ci=nid;A.cf=null;A.lat=now;A.jc++;$('s-j').textContent=A.jc;
const s=pick(nid,null);if(!s){stop();return}goS(s);preC()}
function mV(n){const nd=A.g.N.get(n);if(!nd)return;const ic=L.divIcon({className:'',html:'<div style="width:5px;height:5px;border-radius:50%;background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.2)"></div>',iconSize:[5,5],iconAnchor:[2,2]});A.vm.push(L.marker([nd.lat,nd.lon],{icon:ic,interactive:false,zIndexOffset:-100}).addTo(A.map))}
function uDir(){if(!A.cs||!A.fp)return;const t=A.g.N.get(A.ti);if(!t)return;const dist=hav(A.fp.lat,A.fp.lon,t.lat,t.lon),d=bD(bear(A.fp.lat,A.fp.lon,t.lat,t.lon));
$('h-dir').textContent=d.a+' '+d.n;$('h-dir').style.color='var(--g)';
let sub=`${round(dist)}m`;if(A.ns){const ns=A.g.N.get(A.ns.f),np=A.ns.co.length>1?A.ns.co[1]:A.g.N.get(A.ns.t);if(ns&&np){const d2=bD(bear(ns.lat,ns.lon,np.lat,np.lon));sub+=` > ${d2.a} ${A.ns.d}m`}}
$('h-sub').textContent=sub;
if(!A.aa&&dist<40&&A.swd>10){A.aa=true;V.say(`${round(dist)}m`,`${round(dist)} meters`);BG.vib([150,80,150,80,150])}
BG.ms(`${d.a} ${d.n} ${round(dist)}m`)}

// ── REC mode junction detection ──
function chkRecJct(lat,lon){
  if(!A.g||!A.g.IX.size)return;
  const now=Date.now();if(now-A._lastJctCheck<3000)return;A._lastJctCheck=now;
  for(const nid of A.g.IX){
    if(A._recPassedJct.has(nid))continue;
    if((A.g.A.get(nid)?.size||0)<3)continue;
    const nd=A.g.N.get(nid);if(!nd)continue;
    if(hav(lat,lon,nd.lat,nd.lon)<20){A._recPassedJct.add(nid);A.jc++;$('s-j').textContent=A.jc}
  }
}

// ── Arrival check (RAND) ──
function chk(lat,lon,now,mv){if(!mv||A.st!=='WALK'||A.mode!=='rand')return;if(now-A.lat<5000)return;
const t=A.g.N.get(A.ti);if(t){const d=hav(lat,lon,t.lat,t.lon),sl=A.cs?.d||999;if(d<25&&(A.swd>sl*.35||sl<30)){A.st='ARR';onA(now);return}}
if(A.swd<20||!A.cs)return;if(d2p(lat,lon,A.cs.co)<50)return;
const skip=new Set([A.ci,A.ti,A.cf]);if(A.ns)skip.add(A.ns.t);
for(const nid of A.g.IX){if(skip.has(nid))continue;const nd=A.g.N.get(nid);if(!nd)continue;if(hav(lat,lon,nd.lat,nd.lon)<25){A.st='ARR';onD(nid,now);return}}}

// ── GPS位置更新 (修正版) ──
// A.wc は [lat, lon, kmh] で管理
function onPos(rl,ro,acc){
  const now=Date.now();
  if(now-A.lastG<600)return;
  A.lastG=now;
  const gapMs=A._lastPosTime?(now-A._lastPosTime):0;

  // シミュレーション/マニュアルモード
  if(A.sim||A.manual){
    A.fp={lat:rl,lon:ro};A.um.setLatLng([rl,ro]);A.uc.setLatLng([rl,ro]);A.uc.setRadius(5);
    const l=A.wc[A.wc.length-1];
    if(l){
      const d=hav(l[0],l[1],rl,ro);
      if(d>1){
        A.td+=d;A.swd+=d;$('s-d').textContent=round(A.td);
        const dt=(now-(A._lastPosTime||now))*0.001,kmh=dt>0?d/dt*3.6:0;
        $('s-sp').textContent=isFinite(kmh)?kmh.toFixed(1):'-';
        A.wc.push([rl,ro,kmh]);
        if(A.spdCol)addSpdSeg(l[0],l[1],rl,ro,kmh);
        else A.wl.addLatLng([rl,ro]);
      }
    } else {
      A.wc.push([rl,ro,0]);
    }
    A._lastPosTime=now;
    if(A.st==='WALK'){if(A.mode==='rand')uDir();if(A.mode==='rec')chkRecJct(rl,ro);chk(rl,ro,now,true);A.map.panTo([rl,ro],{animate:true,duration:.3})}
    return;
  }

  // 通常GPSモード
  acc=acc||100;uGPS(acc);if(acc>80)return;
  const f=A.kf.upd(rl,ro,acc,now);
  A.fp={lat:f.lat,lon:f.lon};
  A.um.setLatLng([f.lat,f.lon]);A.uc.setLatLng([f.lat,f.lon]);A.uc.setRadius(max(acc,8));
  A.sd.add(f.lat,f.lon,now);
  const mv=A.sd.mov();
  const l=A.wc[A.wc.length-1];

  // バックグラウンド復帰時(gapMs>6s)は移動判定を緩和してラインを繋ぐ
  const gapLarge=gapMs>6000&&A.st==='WALK';
  const allowAdd=mv||gapLarge;

  if(allowAdd&&l){
    const d=hav(l[0],l[1],f.lat,f.lon);
    // 通常は2〜30m、バックグラウンド復帰時は2〜150m
    const dMax=gapLarge?150:30;
    if(d>2&&d<dMax){
      A.td+=d;A.swd+=d;$('s-d').textContent=round(A.td);
      const dt=(now-(A._lastPosTime||now))/1000,kmh=dt>0?d/dt*3.6:0;
      $('s-sp').textContent=kmh.toFixed(1);
      A.wc.push([f.lat,f.lon,kmh]);
      if(A.spdCol)addSpdSeg(l[0],l[1],f.lat,f.lon,kmh);
      else A.wl.addLatLng([f.lat,f.lon]);
    }
  } else if(!l){
    A.wc.push([f.lat,f.lon,0]);
  }
  A._lastPosTime=now;
  if(A.st==='WALK'){if(A.mode==='rand')uDir();if(A.mode==='rec')chkRecJct(f.lat,f.lon);chk(f.lat,f.lon,now,mv);A.map.panTo([f.lat,f.lon],{animate:true,duration:.5})}
}

function startSim(seg){if(A.si)clearInterval(A.si);let i=0;const co=seg.co;A.si=setInterval(()=>{i++;if(i>=co.length){clearInterval(A.si);A.si=null;onPos(co[co.length-1].lat,co[co.length-1].lon);return}const a=co[i-1],b=co[i];let s=0;const mi=setInterval(()=>{s++;const t=s/5;onPos(a.lat+(b.lat-a.lat)*t,a.lon+(b.lon-a.lon)*t);if(s>=5)clearInterval(mi)},6)},120)}
function uTime(){if(!A.t0)return;$('s-t').textContent=fT(floor((Date.now()-A.t0)/1000))}

// ── SHOW ON MAP: 経路をメインマップで全画面閲覧 ──
function clearMapHistLayers(){
  A.mapHistLayers.forEach(l=>A.map.removeLayer(l));
  A.mapHistLayers=[];
}

function drawMapHistRoute(r,useHm){
  clearMapHistLayers();
  if(!r.path||!r.path.length)return;
  const ll=r.path.map(p=>[p[0],p[1]]);
  const hasSpd=r.path[0].length>2;
  if(useHm&&hasSpd){
    for(let i=1;i<r.path.length;i++){
      const a=r.path[i-1],b=r.path[i],kmh=b[2]||0;
      A.mapHistLayers.push(L.polyline([[a[0],a[1]],[b[0],b[1]]],{color:spd2col(kmh),weight:3.5,opacity:.85}).addTo(A.map));
    }
  } else {
    A.mapHistLayers.push(L.polyline(ll,{color:'#4ade80',weight:3,opacity:.8}).addTo(A.map));
  }
  // スタート・エンドマーカー
  if(ll.length>0){
    const sIc=L.divIcon({className:'',html:'<div style="width:12px;height:12px;border-radius:50%;border:2.5px solid #4ade80;background:transparent"></div>',iconSize:[12,12],iconAnchor:[6,6]});
    A.mapHistLayers.push(L.marker(ll[0],{icon:sIc,interactive:false,zIndexOffset:500}).addTo(A.map));
    if(ll.length>1){
      const eIc=L.divIcon({className:'',html:'<div style="width:10px;height:10px;border-radius:50%;background:#4ade80"></div>',iconSize:[10,10],iconAnchor:[5,5]});
      A.mapHistLayers.push(L.marker(ll[ll.length-1],{icon:eIc,interactive:false,zIndexOffset:500}).addTo(A.map));
    }
  }
  if(ll.length>1)A.map.fitBounds(L.latLngBounds(ll).pad(.15));
  else if(ll.length===1)A.map.setView(ll[0],17);
}

// SHOW ON MAP モード開始（詳細ビューから・≡経由のLOG一覧からの両方に対応）
function showRouteOnMainMap(r){
  const wasAlreadyInMapHistMode=A.mapHistMode;
  A.mapHistMode=true;
  A.mapHistId=r.id;
  // 詳細ビューから新規に入る場合のみ、ミニマップのヒートマップ状態を引き継ぐ
  // ≡経由でLOG一覧から別の回に切り替える場合は現在のA.mapHistHmを維持
  if(!wasAlreadyInMapHistMode) A.mapHistHm=HD.hm;
  // 履歴パネルを閉じる（#bar は非表示のまま）
  $('hist').classList.remove('open');
  // 詳細ビューをリセット（ミニマップの破棄）
  $('hist-det').classList.remove('open');
  if(HD.map){setTimeout(()=>{if(HD.map){HD.map.remove();HD.map=null;HD.segs=[];HD.routeLayer=null;}},300);}
  // 経路を描画（切り替え時は前の経路を消去してから描画）
  drawMapHistRoute(r,A.mapHistHm);
  // ボタン状態を同期
  $('map-hist-hm-btn').classList.toggle('von',A.mapHistHm);
  // 情報ラベル
  $('map-hist-info').textContent=`${r.date} · ${r.dist}m`;
  // マップ閲覧バーを表示（#bar は引き続き非表示）
  $('map-hist-bar').style.display='';
  $('bar').style.display='none';
}

// SHOW ON MAP モード終了 → LOG一覧へ戻る
function exitMapHistMode(){
  A.mapHistMode=false;
  clearMapHistLayers();
  $('map-hist-bar').style.display='none';
  // LOG一覧を開き直す
  openHist();
}

// ── 履歴詳細ビュー ──
function openHistDet(r){
  HD.currentId=r.id;HD.hm=false;
  $('hd-title').textContent=r.date;
  const hasSpd=r.path&&r.path.length>0&&r.path[0].length>2;
  $('hd-info').innerHTML=
    `<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
       <span class="hc-tag ${r.mode==='rand'?'r':'w'}">${r.mode==='rand'?'RAND':'REC'}</span>
       ${hasSpd?'':'<span style="font-size:8px;color:var(--dm);letter-spacing:.05em">NO SPEED DATA</span>'}
     </div>
     <div class="hc-s"><b>${r.dist}</b>m &nbsp;&nbsp; ${r.dur} &nbsp;&nbsp; <b>${r.junc}</b> jct</div>`;
  $('hd-memo').value=r.memo||'';
  $('hd-hm').classList.remove('von');
  $('hist-det').classList.add('open');

  // トランジション完了後にミニマップを初期化
  setTimeout(()=>{
    if(HD.map){HD.map.remove();HD.map=null;HD.segs=[];HD.routeLayer=null;}
    HD.map=L.map('hd-map',{zoomControl:false,attributionControl:false,dragging:true,scrollWheelZoom:false,touchZoom:true});
    L.tileLayer(TL['dark'].u,{maxZoom:TL['dark'].z}).addTo(HD.map);
    renderHdRoute(r,false);
    HD.map.invalidateSize();
  },280);
}

function renderHdRoute(r,useHm){
  if(!HD.map||!r.path||!r.path.length)return;
  // 既存の経路レイヤーを削除
  HD.segs.forEach(s=>HD.map.removeLayer(s));HD.segs=[];
  if(HD.routeLayer){HD.map.removeLayer(HD.routeLayer);HD.routeLayer=null;}
  const ll=r.path.map(p=>[p[0],p[1]]);
  const hasSpd=r.path[0].length>2;

  if(useHm&&hasSpd){
    // ヒートマップ: 速度ごとに色付きセグメントを描画
    for(let i=1;i<r.path.length;i++){
      const a=r.path[i-1],b=r.path[i],kmh=b[2]||0;
      HD.segs.push(L.polyline([[a[0],a[1]],[b[0],b[1]]],{color:spd2col(kmh),weight:3,opacity:.8}).addTo(HD.map));
    }
  } else {
    // 通常: 緑のポリライン
    HD.routeLayer=L.polyline(ll,{color:'#4ade80',weight:2.5,opacity:.7}).addTo(HD.map);
  }

  // スタート・エンドマーカー
  if(ll.length>0){
    const sIc=L.divIcon({className:'',html:'<div style="width:8px;height:8px;border-radius:50%;border:2px solid #4ade80;background:transparent"></div>',iconSize:[8,8],iconAnchor:[4,4]});
    HD.segs.push(L.marker(ll[0],{icon:sIc,interactive:false}).addTo(HD.map));
    if(ll.length>1){
      const eIc=L.divIcon({className:'',html:'<div style="width:8px;height:8px;border-radius:50%;background:#4ade80"></div>',iconSize:[8,8],iconAnchor:[4,4]});
      HD.segs.push(L.marker(ll[ll.length-1],{icon:eIc,interactive:false}).addTo(HD.map));
    }
  }

  if(ll.length>1)HD.map.fitBounds(L.latLngBounds(ll).pad(.15));
  else if(ll.length===1)HD.map.setView(ll[0],16);
}

function closeHistDet(){
  $('hist-det').classList.remove('open');
  // トランジション後にマップを破棄
  setTimeout(()=>{
    if(HD.map){HD.map.remove();HD.map=null;HD.segs=[];HD.routeLayer=null;}
  },280);
}

// ── 履歴パネル開閉 ──
function openHist(){
  H.render();
  $('hist').classList.add('open');
  $('bar').style.display='none'; // 記録コントロールを隠す
}
function closeHist(){
  // マップ閲覧モード中なら経路も片付ける
  if(A.mapHistMode){
    A.mapHistMode=false;
    clearMapHistLayers();
    $('map-hist-bar').style.display='none';
  }
  closeHistDet();
  $('hist').classList.remove('open');
  $('bar').style.display=''; // 記録コントロールを戻す
}

// ── Boot ──
function initM(lat,lon){A.manual=true;A.fp={lat,lon};initMap(lat,lon);A.map.setZoom(16);$('tap').style.display='';$('ld').classList.add('gone');A.st='READY';
A.map.on('click',e=>{A.fp={lat:e.latlng.lat,lon:e.latlng.lng};A.um.setLatLng(e.latlng);A.uc.setLatLng(e.latlng);A.map.panTo(e.latlng);$('tap').style.display='none'})}
async function boot(){const lt=$('lt');
if(!('geolocation' in navigator)||(typeof window.isSecureContext!=='undefined'&&!window.isSecureContext)){lt.textContent='NO GPS';manFB();return}
lt.textContent='GPS...';
try{const p=await new Promise((ok,ng)=>{let best=null,ba=1e4,n=0;const w=navigator.geolocation.watchPosition(p=>{n++;const a=p.coords.accuracy;lt.textContent=`${round(a)}m (${n})`;if(a<ba){ba=a;best=p}if(a<=30||n>=8){navigator.geolocation.clearWatch(w);ok(best||p)}},e=>{navigator.geolocation.clearWatch(w);ng(e)},{enableHighAccuracy:true,maximumAge:0,timeout:15000});setTimeout(()=>{navigator.geolocation.clearWatch(w);best?ok(best):ng(Error('t'))},16000)});
const lat=p.coords.latitude,lon=p.coords.longitude,acc=p.coords.accuracy;
A.kf.upd(lat,lon,acc,Date.now());A.fp={lat,lon};initMap(lat,lon);uGPS(acc);
A.wid=navigator.geolocation.watchPosition(p=>onPos(p.coords.latitude,p.coords.longitude,p.coords.accuracy),()=>{},{enableHighAccuracy:true,maximumAge:1000,timeout:10000});
$('ld').classList.add('gone');A.st='READY'}catch(e){lt.textContent='GPS FAIL';manFB()}}
function manFB(){const p=$('lt').parentElement;
const r=document.createElement('div');r.className='lr';r.textContent='HTTPS / PERMISSION REQUIRED';p.appendChild(r);
const b=document.createElement('button');b.className='lb';b.textContent='MANUAL MODE';b.onclick=()=>initM(35.6284,139.7387);p.appendChild(b);
const rb=document.createElement('button');rb.className='lb2';rb.textContent='RETRY';rb.onclick=()=>{r.remove();b.remove();rb.remove();$('lt').textContent='...';boot()};p.appendChild(rb)}

// ── イベントハンドラ ──
$('b-r').onclick=()=>{if(!A.wid&&!A.sim&&!A.manual)A.sim=true;$('tap').style.display='none';go('rand')};
$('b-w').onclick=()=>{if(!A.wid&&!A.sim&&!A.manual)A.sim=true;$('tap').style.display='none';go('rec')};
$('b-s').onclick=stop;
document.querySelectorAll('.tb').forEach(b=>b.onclick=()=>setT(b.dataset.t));
$('b-v').onclick=function(){if(V.on){V.disable();this.textContent='V';this.classList.remove('von')}else{V.enable();this.textContent='V';this.classList.add('von')}};
$('b-h').onclick=openHist;
$('hx').onclick=closeHist;
$('b-c').onclick=()=>{if(A.fp&&A.map)A.map.setView([A.fp.lat,A.fp.lon],17,{animate:true})};

// 速度カラートグル: 既存のA.wcデータから全セグメントを再構築
$('b-sc').onclick=function(){
  A.spdCol=!A.spdCol;this.classList.toggle('von',A.spdCol);
  if(!A.spdCol){
    clearSpdSegs();
    // A.wcのlat/lonのみ使って緑ラインを復元
    A.wl.setLatLngs(A.wc.map(p=>[p[0],p[1]]));
  } else {
    A.wl.setLatLngs([]);
    rebuildSpdSegs(); // A.wcの速度データから全区間を色付き再描画
  }
};

// 履歴詳細イベント
$('hd-back').onclick=closeHistDet;
$('hd-hm').onclick=function(){
  const r=H.load().find(x=>x.id===HD.currentId);
  if(!r||!r.path||!r.path.length)return;
  if(!r.path[0]||r.path[0].length<3){toast('NO SPEED DATA');return;}
  HD.hm=!HD.hm;this.classList.toggle('von',HD.hm);
  renderHdRoute(r,HD.hm);
};
$('hd-memo').onblur=function(){if(HD.currentId)H.memo(HD.currentId,this.value)};

// SHOW ON MAP ボタン: 詳細ビュー → メインマップ閲覧モード
$('hd-showmap').onclick=function(){
  const r=H.load().find(x=>x.id===HD.currentId);
  if(r)showRouteOnMainMap(r);
};

// マップ閲覧バーのイベント
// ← LOG: メインマップ閲覧モード終了 → LOG一覧へ
$('map-hist-back-btn').onclick=exitMapHistMode;

// ヒートマップトグル (マップ閲覧モード中)
$('map-hist-hm-btn').onclick=function(){
  const r=H.load().find(x=>x.id===A.mapHistId);
  if(!r||!r.path||!r.path.length)return;
  if(!r.path[0]||r.path[0].length<3){toast('NO SPEED DATA');return;}
  A.mapHistHm=!A.mapHistHm;
  this.classList.toggle('von',A.mapHistHm);
  drawMapHistRoute(r,A.mapHistHm);
};

// ≡ ボタン (マップ閲覧モード中): LOG一覧を開く
// 経路はマップ上に残し、ヒストパネルを手前に表示
// 別の回の「SHOW ON MAP」を選択すれば切り替え可能
// × で完全終了（通常の地図画面へ）
$('map-hist-log-btn').onclick=function(){
  $('map-hist-bar').style.display='none'; // バーを隠してLOG一覧をフルスクリーンに
  H.render();
  $('hist').classList.add('open');
  // #bar は非表示のまま維持（mapHistMode=true が closeHist で検知される）
};

boot();
</script>
