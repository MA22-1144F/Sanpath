<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>ランダム散歩</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#1a1a2e;--card:#16213e;--card-border:#0f3460;--accent:#e94560;--accent2:#53d8fb;--accent3:#ffc857;--text:#e8e8e8;--text-dim:#7a8ba6;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans JP','DM Mono',sans-serif;background:var(--bg);color:var(--text);height:100vh;height:100dvh;width:100vw;overflow:hidden;position:relative;}
  #map{position:absolute;top:0;left:0;right:0;bottom:0;z-index:1;}

  #direction-banner{position:absolute;top:0;left:0;right:0;z-index:1000;padding:12px 16px;padding-top:max(env(safe-area-inset-top,12px),12px);background:linear-gradient(180deg,rgba(26,26,46,0.95) 0%,rgba(26,26,46,0.7) 80%,transparent 100%);text-align:center;pointer-events:none;transition:opacity 0.4s;}
  #direction-banner.hidden{opacity:0;}
  .dir-label{font-size:11px;letter-spacing:0.15em;color:var(--text-dim);text-transform:uppercase;margin-bottom:4px;font-family:'DM Mono',monospace;}
  .dir-main{font-size:32px;font-weight:900;line-height:1.2;text-shadow:0 2px 20px rgba(233,69,96,0.4);}
  .dir-sub{font-size:13px;color:var(--accent2);margin-top:4px;font-family:'DM Mono',monospace;}

  #gps-info{position:absolute;top:6px;left:50%;transform:translateX(-50%);z-index:999;pointer-events:none;transition:opacity 0.3s;}
  #gps-info.hidden{opacity:0;}
  .gps-badge{display:inline-flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:10px;padding:3px 10px;border-radius:12px;background:rgba(22,33,62,0.9);border:1px solid var(--card-border);}
  .gps-dot{width:7px;height:7px;border-radius:50%;transition:background 0.3s;}

  #bottom-panel{position:absolute;bottom:0;left:0;right:0;z-index:1000;padding:0 16px 16px;padding-bottom:calc(max(env(safe-area-inset-bottom,16px),16px) + 60px);background:linear-gradient(0deg,rgba(26,26,46,0.97) 0%,rgba(26,26,46,0.88) 55%,rgba(26,26,46,0.5) 80%,transparent 100%);display:flex;flex-direction:column;align-items:center;gap:10px;}
  .stats-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;align-items:center;}
  .stat-item{text-align:center;min-width:60px;}
  .stat-val{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--accent2);}
  .stat-label{font-size:10px;color:var(--text-dim);letter-spacing:0.1em;text-transform:uppercase;}
  .btn-main{font-family:'Noto Sans JP',sans-serif;font-size:16px;font-weight:900;padding:14px 44px;border:none;border-radius:50px;cursor:pointer;letter-spacing:0.05em;transition:all 0.2s;-webkit-tap-highlight-color:transparent;}
  .btn-main:active{transform:scale(0.95);}
  .btn-start{background:var(--accent);color:#fff;box-shadow:0 4px 24px rgba(233,69,96,0.4);}
  .btn-stop{background:transparent;color:var(--accent);border:2px solid var(--accent);}
  .btn-row{display:flex;gap:10px;align-items:center;}

  /* Voice toggle */
  .voice-toggle{
    width:44px;height:44px;border-radius:50%;border:2px solid var(--card-border);
    background:var(--card);color:var(--text-dim);font-size:20px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:all 0.2s;
    -webkit-tap-highlight-color:transparent;flex-shrink:0;
  }
  .voice-toggle.active{background:var(--accent3);color:var(--bg);border-color:var(--accent3);box-shadow:0 2px 12px rgba(255,200,87,0.3);}
  .voice-toggle:active{transform:scale(0.9);}

  /* Wake lock indicator */
  #wake-badge{
    position:absolute;top:10px;left:10px;z-index:1100;
    padding:3px 8px;border-radius:10px;font-size:9px;font-weight:700;
    font-family:'DM Mono',monospace;display:none;
    background:rgba(69,185,124,0.2);color:#45b97c;border:1px solid rgba(69,185,124,0.4);
  }

  #style-switcher{position:absolute;bottom:0;left:0;right:0;z-index:1001;padding-bottom:max(env(safe-area-inset-bottom,8px),8px);display:flex;justify-content:center;gap:6px;padding-top:6px;background:rgba(26,26,46,0.97);border-top:1px solid rgba(255,255,255,0.06);}
  .style-btn{font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:700;padding:5px 12px;border:1.5px solid var(--card-border);border-radius:16px;background:var(--card);color:var(--text-dim);cursor:pointer;transition:all 0.2s;-webkit-tap-highlight-color:transparent;}
  .style-btn.active{background:var(--accent2);color:var(--bg);border-color:var(--accent2);}

  #roulette-overlay{position:absolute;top:0;left:0;right:0;bottom:0;z-index:2000;background:rgba(26,26,46,0.85);display:flex;align-items:center;justify-content:center;flex-direction:column;opacity:0;pointer-events:none;transition:opacity 0.3s;backdrop-filter:blur(4px);}
  #roulette-overlay.active{opacity:1;pointer-events:auto;}
  .roulette-text{font-size:14px;color:var(--accent3);margin-bottom:16px;font-family:'DM Mono',monospace;letter-spacing:0.2em;animation:pulse 0.6s ease infinite alternate;}
  .roulette-dir{font-size:64px;font-weight:900;transition:all 0.08s;}
  .roulette-name{font-size:22px;font-weight:700;margin-top:8px;color:var(--accent2);}

  #loading-screen{position:absolute;top:0;left:0;right:0;bottom:0;z-index:3000;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity 0.5s;}
  #loading-screen.hidden{opacity:0;pointer-events:none;}
  .loader{width:48px;height:48px;border:3px solid var(--card-border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
  .loading-text{font-size:14px;color:var(--text-dim);text-align:center;padding:0 24px;line-height:1.7;}

  #toast{position:absolute;top:80px;left:50%;transform:translateX(-50%);z-index:1500;background:var(--card);border:1px solid var(--card-border);padding:10px 20px;border-radius:24px;font-size:13px;color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,0.4);opacity:0;pointer-events:none;transition:opacity 0.3s;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;}
  #toast.show{opacity:1;}
  #sim-badge{position:absolute;top:10px;right:10px;z-index:1100;background:var(--accent3);color:var(--bg);padding:4px 10px;border-radius:12px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;display:none;}
  #manual-badge{position:absolute;top:10px;right:10px;z-index:1100;background:var(--accent2);color:var(--bg);padding:4px 10px;border-radius:12px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;display:none;}
  #tap-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1100;pointer-events:none;display:none;}
  .tap-hint-inner{background:rgba(22,33,62,0.92);border:1.5px solid var(--accent2);padding:14px 24px;border-radius:16px;font-size:15px;font-weight:700;color:var(--accent2);white-space:nowrap;animation:tapPulse 2s ease infinite;box-shadow:0 4px 30px rgba(83,216,251,0.2);}
  @keyframes tapPulse{0%,100%{opacity:0.85;transform:scale(1);}50%{opacity:1;transform:scale(1.03);}}
  .loading-reason{margin-top:12px;padding:12px 20px;border-radius:12px;background:rgba(233,69,96,0.1);border:1px solid rgba(233,69,96,0.3);font-size:11px;color:#ccc;line-height:1.8;max-width:320px;text-align:left;}
  .loading-reason b{color:var(--accent);}
  .loading-btn{font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;padding:12px 32px;border:none;border-radius:50px;cursor:pointer;margin-top:12px;background:var(--accent2);color:var(--bg);-webkit-tap-highlight-color:transparent;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes pulse{from{opacity:0.5;}to{opacity:1;}}
  .leaflet-control-attribution{font-size:9px !important;}
  .junction-next{width:20px;height:20px;border-radius:50%;background:var(--accent3);border:2px solid #fff;box-shadow:0 0 12px rgba(255,200,87,0.6);}
</style>
</head>
<body>
<div id="loading-screen"><div class="loader"></div><div class="loading-text" id="loading-text">位置情報を取得中...</div></div>
<div id="map"></div>
<div id="gps-info" class="hidden"><div class="gps-badge"><div class="gps-dot" id="gps-dot"></div><span id="gps-acc-text">GPS: ---</span></div></div>
<div id="wake-badge">🔒 画面維持</div>
<div id="direction-banner" class="hidden">
  <div class="dir-label">次の方向</div>
  <div class="dir-main" id="dir-main">↑ 北</div>
  <div class="dir-sub" id="dir-sub">次の交差点まで 120m</div>
</div>
<div id="roulette-overlay">
  <div class="roulette-text">▶ 方向を選択中...</div>
  <div class="roulette-dir" id="roulette-dir">↑</div>
  <div class="roulette-name" id="roulette-name">北</div>
</div>
<div id="toast"></div>
<div id="sim-badge">SIMULATION</div>
<div id="manual-badge" style="display:none;">📍 手動モード</div>
<div id="tap-hint" style="display:none;"><div class="tap-hint-inner">📍 地図をタップして現在地を設定</div></div>
<div id="bottom-panel">
  <div class="stats-row" id="stats-row" style="display:none;">
    <div class="stat-item"><div class="stat-val" id="stat-dist">0</div><div class="stat-label">m 歩行</div></div>
    <div class="stat-item"><div class="stat-val" id="stat-junctions">0</div><div class="stat-label">交差点</div></div>
    <div class="stat-item"><div class="stat-val" id="stat-time">0:00</div><div class="stat-label">経過</div></div>
  </div>
  <div class="btn-row">
    <button class="voice-toggle" id="btn-voice" title="音声ガイド">🔇</button>
    <button class="btn-main btn-start" id="btn-start">🎲 ランダム散歩 開始</button>
    <button class="btn-main btn-stop" id="btn-stop" style="display:none;">■ 終了</button>
  </div>
</div>
<div id="style-switcher">
  <button class="style-btn active" data-style="standard">標準</button>
  <button class="style-btn" data-style="dark">ダーク</button>
  <button class="style-btn" data-style="satellite">航空写真</button>
  <button class="style-btn" data-style="pale">淡色</button>
  <button class="style-btn" data-style="topo">地形</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════════
function haversine(lat1,lon1,lat2,lon2){const R=6371e3,toR=d=>d*Math.PI/180,dLat=toR(lat2-lat1),dLon=toR(lon2-lon1),a=Math.sin(dLat/2)**2+Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function bearing(lat1,lon1,lat2,lon2){const toR=d=>d*Math.PI/180,dLon=toR(lon2-lon1),y=Math.sin(dLon)*Math.cos(toR(lat2)),x=Math.cos(toR(lat1))*Math.sin(toR(lat2))-Math.sin(toR(lat1))*Math.cos(toR(lat2))*Math.cos(dLon);return(Math.atan2(y,x)*180/Math.PI+360)%360;}
const DIR_ARROWS=['↑','↗','→','↘','↓','↙','←','↖'];
const DIR_NAMES=['北','北東','東','南東','南','南西','西','北西'];
const DIR_NAMES_EN=['North','Northeast','East','Southeast','South','Southwest','West','Northwest'];
function bearingToDir(b){const i=Math.round(b/45)%8;return{arrow:DIR_ARROWS[i],name:DIR_NAMES[i],nameEn:DIR_NAMES_EN[i],idx:i};}

// ═══════════════════════════════════════════════════════════
//  VOICE GUIDE — Japanese → English → Beep fallback
// ═══════════════════════════════════════════════════════════
class VoiceGuide {
  constructor() {
    this.enabled = false;
    this.mode = 'off'; // 'ja', 'en', 'beep', 'off'
    this.synth = window.speechSynthesis || null;
    this.jaVoice = null;
    this.enVoice = null;
    this.audioCtx = null;
    this._detectVoices();
    // Voices may load async
    if (this.synth) {
      this.synth.onvoiceschanged = () => this._detectVoices();
    }
  }

  _detectVoices() {
    if (!this.synth) return;
    const voices = this.synth.getVoices();
    // Find Japanese voice
    this.jaVoice = voices.find(v => v.lang.startsWith('ja')) || null;
    // Find English voice
    this.enVoice = voices.find(v => v.lang.startsWith('en') && v.localService) ||
                   voices.find(v => v.lang.startsWith('en')) || null;
    console.log('Voices:', this.jaVoice?.name, this.enVoice?.name);
  }

  _getAudioCtx() {
    if (!this.audioCtx) {
      this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
    return this.audioCtx;
  }

  enable() {
    this.enabled = true;
    this._detectVoices();
    // Determine best mode
    if (this.synth && this.jaVoice) {
      this.mode = 'ja';
    } else if (this.synth && this.enVoice) {
      this.mode = 'en';
    } else if (this.synth && this.synth.getVoices().length > 0) {
      // Has some voice, try Japanese text with default voice
      this.mode = 'ja';
    } else {
      this.mode = 'beep';
    }
    console.log('Voice mode:', this.mode);
    // Test with a short utterance to activate audio on mobile
    this.speak('音声ガイドオン', 'Voice guide on', null);
    return this.mode;
  }

  disable() {
    this.enabled = false;
    this.mode = 'off';
    if (this.synth) this.synth.cancel();
  }

  speak(jaText, enText, beepPattern) {
    if (!this.enabled) return;

    // Chrome pauses SpeechSynthesis in background — resume workaround
    if (this.synth && this.synth.paused) {
      this.synth.resume();
    }

    if ((this.mode === 'ja' || this.mode === 'en') && this.synth) {
      this.synth.cancel();
      const text = this.mode === 'ja' ? jaText : enText;
      const u = new SpeechSynthesisUtterance(text);
      u.lang = this.mode === 'ja' ? 'ja-JP' : 'en-US';
      const v = this.mode === 'ja' ? this.jaVoice : this.enVoice;
      if (v) u.voice = v;
      u.rate = this.mode === 'ja' ? 1.1 : 1.0;
      u.pitch = 1.0;
      u.volume = 1.0;
      this.synth.speak(u);

      // Chrome bug: speech pauses after ~15s in background
      // Workaround: set a timer to resume if paused
      const resumeCheck = setInterval(() => {
        if (this.synth.paused) this.synth.resume();
        if (!this.synth.speaking) clearInterval(resumeCheck);
      }, 300);
      setTimeout(() => clearInterval(resumeCheck), 10000);
    } else if (this.mode === 'beep') {
      this._playBeep(beepPattern || 'info');
    }
  }

  // Direction beep patterns
  _playBeep(pattern) {
    try {
      const ctx = this._getAudioCtx();
      const now = ctx.currentTime;

      const beep = (freq, start, dur) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, now + start);
        gain.gain.exponentialRampToValueAtTime(0.01, now + start + dur);
        osc.start(now + start);
        osc.stop(now + start + dur);
      };

      switch (pattern) {
        case 'direction': // Cheerful rising: direction decided
          beep(523, 0, 0.15); beep(659, 0.15, 0.15); beep(784, 0.3, 0.3);
          break;
        case 'approaching': // Warning: approaching intersection
          beep(880, 0, 0.1); beep(880, 0.2, 0.1); beep(880, 0.4, 0.1);
          break;
        case 'arrived': // Success: arrived
          beep(523, 0, 0.12); beep(659, 0.12, 0.12); beep(784, 0.24, 0.12); beep(1047, 0.36, 0.4);
          break;
        case 'start': // Walk start
          beep(440, 0, 0.2); beep(660, 0.25, 0.2); beep(880, 0.5, 0.3);
          break;
        case 'stop': // Walk end
          beep(880, 0, 0.2); beep(660, 0.2, 0.2); beep(440, 0.4, 0.4);
          break;
        case 'left': beep(440, 0, 0.2); beep(330, 0.15, 0.3); break;
        case 'right': beep(440, 0, 0.2); beep(660, 0.15, 0.3); break;
        case 'straight': beep(550, 0, 0.3); beep(550, 0.35, 0.3); break;
        default: // info
          beep(660, 0, 0.15); beep(660, 0.2, 0.15);
      }
    } catch (e) { console.warn('Beep error:', e); }
  }

  // High-level guidance methods
  announceDirection(dirName, dirNameEn, distM, dirIdx) {
    // Determine relative direction for beep
    let beepType = 'direction';
    if (dirIdx >= 7 || dirIdx <= 1) beepType = 'straight'; // roughly forward
    else if (dirIdx >= 2 && dirIdx <= 4) beepType = 'right';
    else beepType = 'left';

    this.speak(
      `${dirName}へ進んでください。${distM}メートル先の交差点まで。`,
      `Go ${dirNameEn}. ${distM} meters to the next intersection.`,
      beepType
    );
  }

  announceApproaching(distM) {
    this.speak(
      `まもなく交差点です。あと${distM}メートル。`,
      `Approaching intersection. ${distM} meters.`,
      'approaching'
    );
  }

  announceArrived() {
    this.speak(
      '交差点に到着しました。次の方向を選びます。',
      'Arrived at intersection. Choosing next direction.',
      'arrived'
    );
  }

  announceStart() {
    this.speak('散歩を開始します。', 'Starting walk.', 'start');
  }

  announceStop(distM, junctions) {
    this.speak(
      `散歩が終了しました。${distM}メートル、${junctions}個の交差点を通過しました。`,
      `Walk finished. ${distM} meters, ${junctions} intersections.`,
      'stop'
    );
  }
}

// ═══════════════════════════════════════════════════════════
//  BACKGROUND KEEP-ALIVE
//  Uses <audio> element with generated stream → Android treats
//  Chrome as "playing media" and keeps it alive even with screen off.
//  + Media Session API for lock screen info
//  + Notification API for alerts through lock screen
// ═══════════════════════════════════════════════════════════
class BackgroundKeepAlive {
  constructor() {
    this.wakeLock = null;
    this.audioEl = null;
    this.audioCtx = null;
    this.oscNode = null;
    this.gainNode = null;
    this.streamDest = null;
    this.notifPermission = false;
    this.active = false;
  }

  async acquire() {
    if (this.active) return;
    this.active = true;

    // 1. Wake Lock API (prevents screen from turning off)
    if ('wakeLock' in navigator) {
      try {
        this.wakeLock = await navigator.wakeLock.request('screen');
        this.wakeLock.addEventListener('release', () => {
          document.getElementById('wake-badge').textContent = '🎵 BGモード';
        });
        document.getElementById('wake-badge').style.display = '';
        document.getElementById('wake-badge').textContent = '🔒 画面維持';
      } catch (e) { console.warn('Wake lock failed:', e); }
    }

    // Re-acquire wake lock when returning to foreground
    document.addEventListener('visibilitychange', this._onVisChange = async () => {
      if (document.visibilityState === 'visible' && this.active) {
        if ('wakeLock' in navigator) {
          try {
            this.wakeLock = await navigator.wakeLock.request('screen');
            document.getElementById('wake-badge').textContent = '🔒 画面維持';
            document.getElementById('wake-badge').style.display = '';
          } catch (e) {}
        }
        // Resume audio context if suspended
        if (this.audioCtx && this.audioCtx.state === 'suspended') {
          this.audioCtx.resume();
        }
      }
    });

    // 2. CRITICAL: Audio element with MediaStream — this is what keeps
    //    Chrome alive on Android when screen is off.
    //    Web Audio API alone gets suspended, but an <audio> element
    //    playing a MediaStream is treated as real media playback.
    try {
      this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      // Very quiet oscillator (not silent — must produce actual audio)
      this.oscNode = this.audioCtx.createOscillator();
      this.oscNode.frequency.value = 1; // 1Hz — inaudible
      this.oscNode.type = 'sine';

      this.gainNode = this.audioCtx.createGain();
      this.gainNode.gain.value = 0.01; // extremely quiet but not zero

      // Route through MediaStreamDestination → <audio> element
      this.streamDest = this.audioCtx.createMediaStreamDestination();
      this.oscNode.connect(this.gainNode);
      this.gainNode.connect(this.streamDest);

      // Also connect to actual destination so AudioContext stays active
      const silentGain = this.audioCtx.createGain();
      silentGain.gain.value = 0.001;
      this.oscNode.connect(silentGain);
      silentGain.connect(this.audioCtx.destination);

      this.oscNode.start();

      // Create <audio> element — the key trick
      this.audioEl = document.createElement('audio');
      this.audioEl.srcObject = this.streamDest.stream;
      this.audioEl.loop = true;
      this.audioEl.volume = 0.01;
      // Must call play() — this is what tells Android "media is playing"
      await this.audioEl.play();

      console.log('Background audio keep-alive started');
    } catch (e) {
      console.warn('Background audio failed:', e);
    }

    // 3. Media Session API — shows info on lock screen
    this._setupMediaSession();

    // 4. Request Notification permission
    if ('Notification' in window && Notification.permission === 'default') {
      try {
        const perm = await Notification.requestPermission();
        this.notifPermission = (perm === 'granted');
      } catch (e) { console.warn('Notification permission:', e); }
    } else if ('Notification' in window) {
      this.notifPermission = (Notification.permission === 'granted');
    }

    console.log('Background keep-alive active, notifications:', this.notifPermission);
  }

  _setupMediaSession() {
    if (!('mediaSession' in navigator)) return;

    navigator.mediaSession.metadata = new MediaMetadata({
      title: 'ランダム散歩',
      artist: '散歩中...',
      album: 'Random Walk',
    });

    // Optional: action handlers (play/pause from lock screen)
    try {
      navigator.mediaSession.setActionHandler('pause', () => {
        // Don't actually pause — we need to keep running
        navigator.mediaSession.playbackState = 'playing';
      });
      navigator.mediaSession.setActionHandler('play', () => {
        if (this.audioEl) this.audioEl.play();
        navigator.mediaSession.playbackState = 'playing';
      });
    } catch (e) {}

    navigator.mediaSession.playbackState = 'playing';
  }

  updateMediaSession(direction, distance) {
    if (!('mediaSession' in navigator)) return;
    try {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: `${direction} → ${distance}m`,
        artist: 'ランダム散歩 🎲',
        album: '次の交差点まで',
      });
    } catch (e) {}
  }

  // Send notification (works on lock screen)
  notify(title, body, tag) {
    if (!this.notifPermission || !('Notification' in window)) return;
    try {
      // Close previous notification with same tag
      const n = new Notification(title, {
        body: body,
        tag: tag || 'walk-guide',
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="80">🎲</text></svg>',
        requireInteraction: false,
        silent: false,
        vibrate: [200, 100, 200],
      });
      setTimeout(() => n.close(), 8000);
    } catch (e) { console.warn('Notification error:', e); }
  }

  // Vibrate device (works even with screen off on many Android devices)
  vibrate(pattern) {
    if ('vibrate' in navigator) {
      try { navigator.vibrate(pattern); } catch (e) {}
    }
  }

  release() {
    this.active = false;

    if (this.wakeLock) {
      try { this.wakeLock.release(); } catch (e) {}
      this.wakeLock = null;
    }

    if (this.audioEl) {
      this.audioEl.pause();
      this.audioEl.srcObject = null;
      this.audioEl = null;
    }

    if (this.oscNode) {
      try { this.oscNode.stop(); } catch (e) {}
      this.oscNode = null;
    }

    if (this.audioCtx) {
      try { this.audioCtx.close(); } catch (e) {}
      this.audioCtx = null;
    }

    if (this._onVisChange) {
      document.removeEventListener('visibilitychange', this._onVisChange);
    }

    // Clear media session
    if ('mediaSession' in navigator) {
      try {
        navigator.mediaSession.metadata = null;
        navigator.mediaSession.playbackState = 'none';
      } catch (e) {}
    }

    document.getElementById('wake-badge').style.display = 'none';
    console.log('Background keep-alive released');
  }
}

// ═══════════════════════════════════════════════════════════
//  GPS KALMAN FILTER
// ═══════════════════════════════════════════════════════════
class GPSKalman {
  constructor(){this.lat=null;this.lon=null;this.var=-1;this.ts=0;}
  update(lat,lon,acc,ts){
    acc=Math.max(acc,3);
    if(this.var<0){this.lat=lat;this.lon=lon;this.var=acc*acc;this.ts=ts;return{lat,lon};}
    const dt=(ts-this.ts)/1000;if(dt>0){this.var+=dt*1.5*1.5;this.ts=ts;}
    const K=this.var/(this.var+acc*acc);this.lat+=K*(lat-this.lat);this.lon+=K*(lon-this.lon);this.var*=(1-K);
    return{lat:this.lat,lon:this.lon};
  }
}

// ═══════════════════════════════════════════════════════════
//  STATIONARY DETECTOR
// ═══════════════════════════════════════════════════════════
class StationaryDetector {
  constructor(){this.buf=[];this.maxBuf=15;}
  add(lat,lon,t){this.buf.push({lat,lon,t});if(this.buf.length>this.maxBuf)this.buf.shift();}
  isMoving(){
    if(this.buf.length<4)return false;
    const f=this.buf[0],l=this.buf[this.buf.length-1];
    const disp=haversine(f.lat,f.lon,l.lat,l.lon),dt=(l.t-f.t)/1000;
    if(dt<2)return false;
    return(disp/dt)>0.8&&disp>5;
  }
}

// ═══════════════════════════════════════════════════════════
//  ROAD GRAPH
// ═══════════════════════════════════════════════════════════
class RoadGraph {
  constructor(){this.nodes=new Map();this.adj=new Map();this.wayNodes=new Map();this.nodeWays=new Map();this.intersections=new Set();this.segments=[];}
  loadOverpass(data){
    for(const el of data.elements||[]){if(el.type==='node')this.nodes.set(el.id,{lat:el.lat,lon:el.lon});}
    for(const el of data.elements||[]){
      if(el.type!=='way'||!el.nodes)continue;const nds=el.nodes;this.wayNodes.set(el.id,nds);
      for(let i=0;i<nds.length;i++){const nid=nds[i];if(!this.nodeWays.has(nid))this.nodeWays.set(nid,new Set());this.nodeWays.get(nid).add(el.id);if(!this.adj.has(nid))this.adj.set(nid,new Set());if(i>0){this.adj.get(nid).add(nds[i-1]);if(!this.adj.has(nds[i-1]))this.adj.set(nds[i-1],new Set());this.adj.get(nds[i-1]).add(nid);}}
    }
    for(const[n,nb]of this.adj){if(nb.size>=3||nb.size===1)this.intersections.add(n);}
    for(const[n,w]of this.nodeWays){if(w.size>=2&&this.adj.has(n))this.intersections.add(n);}
    const vis=new Set();
    for(const sid of this.intersections){
      const sn=this.nodes.get(sid);if(!sn)continue;const nb=this.adj.get(sid);if(!nb)continue;
      for(const nxt of nb){
        if(vis.has(`${sid}-${nxt}`))continue;const path=[sid];let cur=nxt,prev=sid,dist=0;
        while(cur&&!this.intersections.has(cur)){path.push(cur);const cn=this.nodes.get(cur),pn=this.nodes.get(prev);if(cn&&pn)dist+=haversine(pn.lat,pn.lon,cn.lat,cn.lon);const a=this.adj.get(cur);let nx=null;for(const n of a){if(n!==prev){nx=n;break;}}prev=cur;cur=nx;}
        if(cur&&this.intersections.has(cur)){path.push(cur);const cn=this.nodes.get(cur),pn=this.nodes.get(prev);if(cn&&pn)dist+=haversine(pn.lat,pn.lon,cn.lat,cn.lon);vis.add(`${sid}-${path[1]}`);vis.add(`${cur}-${path[path.length-2]}`);this.segments.push({from:sid,to:cur,nodeIds:path,coords:path.map(id=>this.nodes.get(id)).filter(Boolean),dist:Math.round(dist)});}
      }
    }
  }
  nearest(lat,lon){let b=null,bd=Infinity;for(const n of this.intersections){const nd=this.nodes.get(n);if(!nd)continue;const d=haversine(lat,lon,nd.lat,nd.lon);if(d<bd){bd=d;b=n;}}return b;}
  segsFrom(id){return this.segments.filter(s=>s.from===id||s.to===id).map(s=>{if(s.to===id)return{from:s.to,to:s.from,nodeIds:[...s.nodeIds].reverse(),coords:[...s.coords].reverse(),dist:s.dist};return s;});}
}

// ═══════════════════════════════════════════════════════════
//  APP STATE
// ═══════════════════════════════════════════════════════════
const voice = new VoiceGuide();
const bgKeepAlive = new BackgroundKeepAlive();

const app = {
  map:null,tileLayer:null,graph:new RoadGraph(),kalman:new GPSKalman(),sd:new StationaryDetector(),
  state:'INIT',filteredPos:null,userMarker:null,userCircle:null,pathLine:null,
  walkedLine:null,walkedCoords:[],junctionMarkers:[],nextMarker:null,
  currentIntersection:null,targetIntersection:null,currentSegment:null,cameFromNode:null,
  junctionCount:0,totalDist:0,startTime:null,timerInterval:null,watchId:null,
  simMode:false,simInterval:null,manualMode:false,segmentWalkedDist:0,lastArrivalTime:0,
  approachAlerted:false,
  visitedIntersections:new Set(), // track visited intersections to avoid revisiting
  visitedMarkers:[], // markers showing visited intersections on map
};

function initMap(lat,lon){
  app.map=L.map('map',{center:[lat,lon],zoom:17,zoomControl:false,attributionControl:true});
  setStyle('standard');
  L.control.zoom({position:'topright'}).addTo(app.map);
  const icon=L.divIcon({className:'',html:'<div style="width:18px;height:18px;background:#53d8fb;border:3px solid #fff;border-radius:50%;box-shadow:0 0 16px rgba(83,216,251,0.6)"></div>',iconSize:[18,18],iconAnchor:[9,9]});
  app.userMarker=L.marker([lat,lon],{icon,zIndexOffset:1000}).addTo(app.map);
  app.userCircle=L.circle([lat,lon],{radius:30,color:'rgba(83,216,251,0.35)',fillColor:'rgba(83,216,251,0.1)',weight:1}).addTo(app.map);
  app.walkedLine=L.polyline([],{color:'#53d8fb',weight:4,opacity:0.7,dashArray:'6,4'}).addTo(app.map);
}
function setStyle(k){const t=TILES[k];if(!t)return;if(app.tileLayer)app.map.removeLayer(app.tileLayer);app.tileLayer=L.tileLayer(t.url,{attribution:t.attr,maxZoom:t.mz}).addTo(app.map);document.querySelectorAll('.style-btn').forEach(b=>b.classList.toggle('active',b.dataset.style===k));}
function updateGPS(acc){const el=document.getElementById('gps-info');el.classList.remove('hidden');document.getElementById('gps-acc-text').textContent=`GPS: ±${Math.round(acc)}m`;document.getElementById('gps-dot').style.background=acc<=10?'#45b97c':acc<=25?'#ffc857':acc<=50?'#e88b3a':'#e94560';}

async function fetchRoads(lat,lon){
  showToast('道路データを取得中...');
  const q=`[out:json][timeout:25];(way(around:800,${lat},${lon})["highway"~"^(residential|tertiary|secondary|primary|unclassified|living_street|pedestrian|footway|path|steps|service|trunk|cycleway)$"];);(._;>;);out body;`;
  try{
    const r=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(q),headers:{'Content-Type':'application/x-www-form-urlencoded'}});
    if(!r.ok)throw 0;const d=await r.json();app.graph.loadOverpass(d);
    if(app.graph.intersections.size<3){showToast('交差点が少ないです');return false;}
    for(const nid of app.graph.intersections){const n=app.graph.nodes.get(nid);if(!n)continue;if((app.graph.adj.get(nid)?.size||0)<3)continue;const ic=L.divIcon({className:'',html:'<div style="width:6px;height:6px;border-radius:50%;background:rgba(233,69,96,0.35);border:1px solid rgba(233,69,96,0.5)"></div>',iconSize:[6,6],iconAnchor:[3,3]});app.junctionMarkers.push(L.marker([n.lat,n.lon],{icon:ic,interactive:false}).addTo(app.map));}
    showToast(`${app.graph.intersections.size} 個の交差点を検出`);return true;
  }catch(e){showToast('道路データの取得に失敗');return false;}
}

async function startWalk(){
  const btn=document.getElementById('btn-start');btn.textContent='現在地を取得中...';btn.disabled=true;
  if(!app.simMode&&!app.manualMode){
    try{
      const freshPos=await new Promise((res,rej)=>{let best=null,bestAcc=9999,att=0;const wid=navigator.geolocation.watchPosition(p=>{att++;const acc=p.coords.accuracy;btn.textContent=`GPS取得中... ±${Math.round(acc)}m`;if(acc<bestAcc){bestAcc=acc;best=p;}if(acc<=30||att>=6){navigator.geolocation.clearWatch(wid);res(best||p);}},err=>{navigator.geolocation.clearWatch(wid);rej(err);},{enableHighAccuracy:true,maximumAge:0,timeout:15000});setTimeout(()=>{navigator.geolocation.clearWatch(wid);if(best)res(best);else rej(new Error('timeout'));},16000);});
      const lat=freshPos.coords.latitude,lon=freshPos.coords.longitude,acc=freshPos.coords.accuracy;
      app.kalman=new GPSKalman();app.kalman.update(lat,lon,acc,Date.now());app.filteredPos={lat,lon};app.sd=new StationaryDetector();
      app.userMarker.setLatLng([lat,lon]);app.userCircle.setLatLng([lat,lon]);app.userCircle.setRadius(Math.max(acc,8));app.map.setView([lat,lon],17);updateGPS(acc);
      showToast(`現在地を取得 (精度: ±${Math.round(acc)}m)`);
    }catch(e){if(!app.filteredPos){btn.textContent='🎲 ランダム散歩 開始';btn.disabled=false;showToast('位置情報を取得できません');return;}showToast('最新の位置を使用します');}
  }
  if(!app.filteredPos){btn.textContent='🎲 ランダム散歩 開始';btn.disabled=false;return;}
  btn.textContent='道路データ取得中...';
  app.graph=new RoadGraph();
  const ok=await fetchRoads(app.filteredPos.lat,app.filteredPos.lon);
  if(!ok){btn.textContent='🎲 ランダム散歩 開始';btn.disabled=false;return;}

  // Acquire wake lock for background
  bgKeepAlive.acquire();

  app.state='IDLE';btn.style.display='none';
  document.getElementById('btn-stop').style.display='';
  document.getElementById('stats-row').style.display='';
  document.getElementById('direction-banner').classList.remove('hidden');
  app.startTime=Date.now();app.timerInterval=setInterval(updateTimer,1000);
  app.walkedCoords=[];app.walkedLine.setLatLngs([]);app.totalDist=0;app.junctionCount=0;
  app.visitedIntersections=new Set();
  app.visitedMarkers.forEach(m=>app.map.removeLayer(m));app.visitedMarkers=[];
  document.getElementById('stat-dist').textContent='0';document.getElementById('stat-junctions').textContent='0';
  const n=app.graph.nearest(app.filteredPos.lat,app.filteredPos.lon);
  if(!n){showToast('近くに交差点がありません');return;}
  app.currentIntersection=n;app.lastArrivalTime=Date.now();app.segmentWalkedDist=0;

  voice.announceStart();
  pickNext();
}

function pickNext(){
  // Mark current intersection as visited
  app.visitedIntersections.add(app.currentIntersection);
  markVisited(app.currentIntersection);

  const segs=app.graph.segsFrom(app.currentIntersection);

  // Priority filtering: unvisited > not-came-from > any
  let cands=segs.filter(s=>!app.visitedIntersections.has(s.to));
  if(!cands.length){
    // All neighbors visited — allow going back but not to immediate predecessor
    cands=segs.filter(s=>s.to!==app.cameFromNode);
  }
  if(!cands.length) cands=segs; // dead end, allow anything
  // Prefer segments > 20m
  let good=cands.filter(s=>s.dist>20);if(good.length)cands=good;

  if(!cands.length){
    showToast('全ての道を通りました！散歩終了');
    voice.speak('全ての道を通りました。散歩終了です。','All paths explored. Walk complete.','stop');
    stopWalk();return;
  }

  app.state='PICKING';
  const ov=document.getElementById('roulette-overlay'),de=document.getElementById('roulette-dir'),ne=document.getElementById('roulette-name');
  ov.classList.add('active');
  let tick=0;const mx=15+Math.floor(Math.random()*8);
  const iv=setInterval(()=>{
    const c=cands[tick%cands.length],sn=app.graph.nodes.get(c.from),np=c.coords.length>1?c.coords[1]:app.graph.nodes.get(c.to);
    if(sn&&np){const b=bearing(sn.lat,sn.lon,np.lat,np.lon),d=bearingToDir(b);de.textContent=d.arrow;de.style.color=tick>=mx-3?'var(--accent3)':'var(--text)';ne.textContent=d.name+' ('+c.dist+'m)';}
    tick++;
    if(tick>=mx){
      clearInterval(iv);
      const ch=cands[tick%cands.length];
      setTimeout(()=>{ov.classList.remove('active');navSeg(ch);},800);
    }
  },80+tick*5);
}

// Show visited intersection on map with a dim marker
function markVisited(nodeId){
  const n=app.graph.nodes.get(nodeId);if(!n)return;
  const ic=L.divIcon({className:'',html:'<div style="width:10px;height:10px;border-radius:50%;background:rgba(83,216,251,0.25);border:1.5px solid rgba(83,216,251,0.4)"></div>',iconSize:[10,10],iconAnchor:[5,5]});
  app.visitedMarkers.push(L.marker([n.lat,n.lon],{icon:ic,interactive:false,zIndexOffset:-100}).addTo(app.map));
}

function navSeg(seg){
  app.state='WALKING';app.currentSegment=seg;app.cameFromNode=app.currentIntersection;
  app.targetIntersection=seg.to;app.junctionCount++;app.segmentWalkedDist=0;app.lastArrivalTime=Date.now();
  app.approachAlerted=false;
  document.getElementById('stat-junctions').textContent=app.junctionCount;
  if(app.pathLine)app.map.removeLayer(app.pathLine);
  app.pathLine=L.polyline(seg.coords.map(c=>[c.lat,c.lon]),{color:'#ffc857',weight:5,opacity:0.8,dashArray:'10,6'}).addTo(app.map);
  if(app.nextMarker)app.map.removeLayer(app.nextMarker);
  const tn=app.graph.nodes.get(seg.to);
  if(tn){const ic=L.divIcon({className:'',html:'<div class="junction-next"></div>',iconSize:[20,20],iconAnchor:[10,10]});app.nextMarker=L.marker([tn.lat,tn.lon],{icon:ic}).addTo(app.map);}
  updateBanner();

  // Voice: announce direction
  const sn=app.graph.nodes.get(seg.from), np=seg.coords.length>1?seg.coords[1]:app.graph.nodes.get(seg.to);
  if(sn&&np){
    const b=bearing(sn.lat,sn.lon,np.lat,np.lon);
    const d=bearingToDir(b);
    voice.announceDirection(d.name, d.nameEn, seg.dist, d.idx);
    // Lock screen + notification
    bgKeepAlive.updateMediaSession(`${d.arrow} ${d.name}`, seg.dist);
    bgKeepAlive.notify('🎲 ' + d.arrow + ' ' + d.name + 'へ進む', seg.dist + 'm先の交差点まで', 'direction');
    bgKeepAlive.vibrate([100, 50, 100, 50, 200]);
  }

  if(app.simMode||app.manualMode) startSim(seg);
}

function updateBanner(){
  if(!app.currentSegment||!app.filteredPos)return;
  const t=app.graph.nodes.get(app.targetIntersection);if(!t)return;
  const dist=haversine(app.filteredPos.lat,app.filteredPos.lon,t.lat,t.lon);
  const d=bearingToDir(bearing(app.filteredPos.lat,app.filteredPos.lon,t.lat,t.lon));
  document.getElementById('dir-main').textContent=d.arrow+' '+d.name;
  document.getElementById('dir-main').style.color='var(--accent3)';
  document.getElementById('dir-sub').textContent=`次の交差点まで ${Math.round(dist)}m`;

  // Voice: approaching alert (once, when within 40m)
  if(!app.approachAlerted && dist < 40 && app.segmentWalkedDist > 10){
    app.approachAlerted = true;
    voice.announceApproaching(Math.round(dist));
    bgKeepAlive.notify('⚠️ まもなく交差点', 'あと' + Math.round(dist) + 'm', 'approach');
    bgKeepAlive.vibrate([200, 100, 200, 100, 200]);
  }
  // Update lock screen
  bgKeepAlive.updateMediaSession(`${d.arrow} ${d.name}`, Math.round(dist));
}

// ═══════════════════════════════════════════════════════════
//  GPS UPDATE
// ═══════════════════════════════════════════════════════════
function onPos(rawLat,rawLon,accuracy){
  const now=Date.now();
  if(app.simMode||app.manualMode){
    app.filteredPos={lat:rawLat,lon:rawLon};
    app.userMarker.setLatLng([rawLat,rawLon]);app.userCircle.setLatLng([rawLat,rawLon]);app.userCircle.setRadius(5);
    const last=app.walkedCoords[app.walkedCoords.length-1];
    if(last){const d=haversine(last[0],last[1],rawLat,rawLon);if(d>1){app.totalDist+=d;app.segmentWalkedDist+=d;document.getElementById('stat-dist').textContent=Math.round(app.totalDist);app.walkedCoords.push([rawLat,rawLon]);app.walkedLine.setLatLngs(app.walkedCoords);}}
    else app.walkedCoords.push([rawLat,rawLon]);
    if(app.state==='WALKING'){updateBanner();checkArr(rawLat,rawLon,now,true);app.map.panTo([rawLat,rawLon],{animate:true,duration:0.3});}
    return;
  }
  accuracy=accuracy||100;updateGPS(accuracy);if(accuracy>80)return;
  const f=app.kalman.update(rawLat,rawLon,accuracy,now);app.filteredPos={lat:f.lat,lon:f.lon};
  app.userMarker.setLatLng([f.lat,f.lon]);app.userCircle.setLatLng([f.lat,f.lon]);app.userCircle.setRadius(Math.max(accuracy,8));
  app.sd.add(f.lat,f.lon,now);const moving=app.sd.isMoving();
  const last=app.walkedCoords[app.walkedCoords.length-1];
  if(moving&&last){const d=haversine(last[0],last[1],f.lat,f.lon);if(d>2&&d<30){app.totalDist+=d;app.segmentWalkedDist+=d;document.getElementById('stat-dist').textContent=Math.round(app.totalDist);app.walkedCoords.push([f.lat,f.lon]);app.walkedLine.setLatLngs(app.walkedCoords);}}
  else if(!last){app.walkedCoords.push([f.lat,f.lon]);}
  if(app.state==='WALKING'){updateBanner();checkArr(f.lat,f.lon,now,moving);app.map.panTo([f.lat,f.lon],{animate:true,duration:0.5});}
}

function checkArr(lat,lon,now,moving){
  if(!moving) return;
  const cooldown = now - app.lastArrivalTime > 8000;
  if(!cooldown) return;

  // 1. Check target intersection (normal arrival)
  const t=app.graph.nodes.get(app.targetIntersection);
  if(t){
    const dist=haversine(lat,lon,t.lat,t.lon);
    const segLen=app.currentSegment?app.currentSegment.dist:999;
    const walked=app.segmentWalkedDist>segLen*0.4||segLen<30;
    if(dist<25&&walked){
      app.state='ARRIVING';
      showToast('🎯 交差点に到着！');
      voice.announceArrived();
      bgKeepAlive.notify('🎯 交差点に到着！', '次の方向を決めます...', 'arrived');
      bgKeepAlive.vibrate([100, 80, 100, 80, 100, 80, 300]);
      if(app.pathLine)app.map.removeLayer(app.pathLine);if(app.nextMarker)app.map.removeLayer(app.nextMarker);
      app.currentIntersection=app.targetIntersection;app.lastArrivalTime=now;
      setTimeout(pickNext,600);
      return;
    }
  }

  // 2. Check for wrong intersection (detour detection)
  //    If user walked >15m and is within 25m of ANY other intersection, reroute
  if(app.segmentWalkedDist < 15) return;

  for(const nid of app.graph.intersections){
    if(nid === app.targetIntersection) continue; // already checked above
    if(nid === app.cameFromNode) continue; // don't re-trigger on start
    if(nid === app.currentIntersection) continue;
    const nd=app.graph.nodes.get(nid);
    if(!nd) continue;
    const d=haversine(lat,lon,nd.lat,nd.lon);
    if(d < 25){
      // Arrived at wrong intersection — reroute!
      app.state='ARRIVING';
      showToast('🔄 別の交差点に到着 — ルート再計算');
      voice.speak(
        '予定と違う交差点に着きました。ルートを再計算します。',
        'Arrived at a different intersection. Recalculating route.',
        'approaching'
      );
      bgKeepAlive.notify('🔄 ルート再計算', '別の交差点に到着しました', 'reroute');
      bgKeepAlive.vibrate([300, 100, 300]);
      if(app.pathLine)app.map.removeLayer(app.pathLine);if(app.nextMarker)app.map.removeLayer(app.nextMarker);
      app.currentIntersection=nid;app.lastArrivalTime=now;
      app.junctionCount++;
      document.getElementById('stat-junctions').textContent=app.junctionCount;
      setTimeout(pickNext,600);
      return;
    }
  }
}

function startSim(seg){
  if(app.simInterval)clearInterval(app.simInterval);let idx=0;const coords=seg.coords;
  app.simInterval=setInterval(()=>{idx++;if(idx>=coords.length){clearInterval(app.simInterval);onPos(coords[coords.length-1].lat,coords[coords.length-1].lon);return;}
  const fr=coords[idx-1],to=coords[idx];let s=0;const mi=setInterval(()=>{s++;const t=s/5;onPos(fr.lat+(to.lat-fr.lat)*t,fr.lon+(to.lon-fr.lon)*t);if(s>=5)clearInterval(mi);},6);},120);
}

function stopWalk(){
  app.state='IDLE';if(app.timerInterval)clearInterval(app.timerInterval);if(app.simInterval)clearInterval(app.simInterval);
  if(app.pathLine)app.map.removeLayer(app.pathLine);if(app.nextMarker)app.map.removeLayer(app.nextMarker);
  app.junctionMarkers.forEach(m=>app.map.removeLayer(m));app.junctionMarkers=[];
  app.visitedMarkers.forEach(m=>app.map.removeLayer(m));app.visitedMarkers=[];
  app.visitedIntersections.clear();
  app.cameFromNode=null;app.currentSegment=null;
  document.getElementById('direction-banner').classList.add('hidden');
  document.getElementById('btn-stop').style.display='none';document.getElementById('stats-row').style.display='none';
  const btn=document.getElementById('btn-start');btn.style.display='';btn.disabled=false;btn.textContent='🎲 ランダム散歩 開始';
  if(app.manualMode)document.getElementById('tap-hint').style.display='';
  voice.announceStop(Math.round(app.totalDist), app.junctionCount);
  bgKeepAlive.release();
  showToast(`散歩完了！ ${Math.round(app.totalDist)}m / ${app.junctionCount}交差点`);
}

function updateTimer(){if(!app.startTime)return;const e=Math.floor((Date.now()-app.startTime)/1000),m=Math.floor(e/60),s=e%60;document.getElementById('stat-time').textContent=`${m}:${s.toString().padStart(2,'0')}`;}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),3000);}

// ═══════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════
function initManualMode(dlat,dlon){
  app.manualMode=true;app.filteredPos={lat:dlat,lon:dlon};initMap(dlat,dlon);app.map.setZoom(16);
  document.getElementById('manual-badge').style.display='';document.getElementById('tap-hint').style.display='';
  document.getElementById('loading-screen').classList.add('hidden');app.state='LOADED';
  app.map.on('click',function(e){const{lat,lng}=e.latlng;app.filteredPos={lat,lon:lng};app.userMarker.setLatLng([lat,lng]);app.userCircle.setLatLng([lat,lng]);app.userCircle.setRadius(10);app.map.panTo([lat,lng]);document.getElementById('tap-hint').style.display='none';showToast(`📍 現在地を設定: ${lat.toFixed(5)}, ${lng.toFixed(5)}`);});
}

async function boot(){
  const le=document.getElementById('loading-screen'),lt=document.getElementById('loading-text');
  if(!('geolocation' in navigator)){lt.innerHTML='Geolocation API非対応';showManualFallback(le,lt,'API_UNAVAILABLE');return;}
  if(typeof window.isSecureContext!=='undefined'&&!window.isSecureContext){lt.innerHTML='GPSが利用できません';showManualFallback(le,lt,'NOT_SECURE');return;}
  lt.innerHTML='位置情報を取得中...<br><span style="font-size:11px;color:#7a8ba6">GPS信号を受信中</span>';
  try{
    const pos=await new Promise((res,rej)=>{let best=null,bestAcc=9999,att=0;const wid=navigator.geolocation.watchPosition(p=>{att++;const acc=p.coords.accuracy;lt.innerHTML=`位置情報を取得中... (精度: ±${Math.round(acc)}m)<br><span style="font-size:11px;color:#7a8ba6">GPS信号を受信中 (${att}回目)</span>`;if(acc<bestAcc){bestAcc=acc;best=p;}if(acc<=30||att>=8){navigator.geolocation.clearWatch(wid);res(best||p);}},err=>{navigator.geolocation.clearWatch(wid);rej(err);},{enableHighAccuracy:true,maximumAge:0,timeout:15000});setTimeout(()=>{navigator.geolocation.clearWatch(wid);if(best)res(best);else rej(new Error('timeout'));},16000);});
    const lat=pos.coords.latitude,lon=pos.coords.longitude,acc=pos.coords.accuracy;
    app.kalman.update(lat,lon,acc,Date.now());app.filteredPos={lat,lon};initMap(lat,lon);updateGPS(acc);
    app.watchId=navigator.geolocation.watchPosition(p=>onPos(p.coords.latitude,p.coords.longitude,p.coords.accuracy),e=>console.warn('GPS:',e),{enableHighAccuracy:true,maximumAge:1000,timeout:10000});
    le.classList.add('hidden');app.state='LOADED';showToast(`GPS精度: ±${Math.round(acc)}m`);
  }catch(e){
    console.warn('Geo fail:',e);const code=e.code||0;
    let reason='UNKNOWN';if(code===1)reason='PERMISSION_DENIED';else if(code===2)reason='POSITION_UNAVAILABLE';else if(code===3)reason='TIMEOUT';
    lt.innerHTML='GPSの取得に失敗しました';showManualFallback(le,lt,reason);
  }
}

function showManualFallback(le,lt,reason){
  let html='';
  switch(reason){
    case'NOT_SECURE':html='<b>原因:</b> HTTPSでないページではGPSが使えません<br><b>解決策:</b> HTMLをGitHub Pagesなどにアップロード、<br>または「手動モード」で地図タップで開始';break;
    case'PERMISSION_DENIED':html='<b>原因:</b> 位置情報がブロックされています<br><b>解決策:</b> ファイルをダウンロードしてHTTPSで開く<br>またはChrome設定→位置情報→許可<br>または「手動モード」で開始';break;
    case'TIMEOUT':case'POSITION_UNAVAILABLE':html='<b>原因:</b> GPS信号を取得できません<br><b>解決策:</b> 端末の位置情報がONか確認<br>屋外で再試行<br>または「手動モード」で開始';break;
    default:html='位置情報が利用できません<br>手動モードで開始できます';
  }
  const r=document.createElement('div');r.className='loading-reason';r.innerHTML=html;lt.parentElement.appendChild(r);
  const b=document.createElement('button');b.className='loading-btn';b.textContent='📍 手動モードで開始';b.addEventListener('click',()=>initManualMode(35.6284,139.7387));lt.parentElement.appendChild(b);
  const rb=document.createElement('button');rb.className='loading-btn';rb.style.cssText='background:transparent;color:var(--text-dim);border:1.5px solid var(--card-border);margin-top:8px';rb.textContent='🔄 GPSを再試行';rb.addEventListener('click',()=>{r.remove();b.remove();rb.remove();lt.innerHTML='位置情報を再取得中...';boot();});lt.parentElement.appendChild(rb);
}

// ═══════════════════════════════════════════════════════════
//  EVENT LISTENERS
// ═══════════════════════════════════════════════════════════
document.getElementById('btn-start').addEventListener('click',async()=>{
  if(!app.watchId&&!app.simMode&&!app.manualMode){app.simMode=true;document.getElementById('sim-badge').style.display='';}
  document.getElementById('tap-hint').style.display='none';
  await startWalk();
});
document.getElementById('btn-stop').addEventListener('click',stopWalk);
document.querySelectorAll('.style-btn').forEach(b=>b.addEventListener('click',()=>setStyle(b.dataset.style)));

// Voice toggle
document.getElementById('btn-voice').addEventListener('click',function(){
  if(voice.enabled){
    voice.disable();
    this.textContent='🔇';this.classList.remove('active');
    showToast('音声ガイド OFF');
  }else{
    const mode=voice.enable();
    this.textContent='🔊';this.classList.add('active');
    const modeLabel={ja:'日本語',en:'英語',beep:'電子音'}[mode]||'';
    showToast(`音声ガイド ON (${modeLabel})`);
  }
});

boot();
</script>
