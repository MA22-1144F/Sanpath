<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sanpath">
<title>Sanpath</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://unpkg.com/@capacitor/core@latest/dist/capacitor.js"></script>
<style>
:root{--g:#4ade80;--bg:#111;--c1:#1a1a1a;--c2:#222;--bd:#333;--tx:#ddd;--dm:#666;--fg:#fff;--sat:0px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Helvetica Neue',Helvetica,sans-serif;background:var(--bg);color:var(--tx);height:100dvh;width:100vw;overflow:hidden}
#map{position:absolute;inset:0;z-index:1}
#hud{position:absolute;top:0;left:0;right:0;z-index:800;pointer-events:none;padding-top:var(--sat);text-align:center;opacity:0;transition:opacity .3s}
#hud.on{opacity:1}
#h-dir{font-size:36px;font-weight:200;letter-spacing:.05em;color:var(--fg);line-height:1}
#h-sub{font-size:11px;color:var(--dm);margin-top:2px;font-weight:500;letter-spacing:.08em}
#gps{position:absolute;top:var(--sat);right:8px;z-index:810;font-size:9px;font-weight:600;color:var(--dm);letter-spacing:.05em;display:none;pointer-events:none}
#gps-dot{width:5px;height:5px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:3px}
#bgb{position:absolute;top:var(--sat);left:8px;z-index:810;font-size:8px;font-weight:600;color:var(--g);letter-spacing:.06em;display:none;pointer-events:none}
#toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1500;background:#000;border:1px solid var(--bd);padding:10px 24px;border-radius:4px;font-size:12px;font-weight:500;letter-spacing:.04em;color:var(--tx);opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap}
#toast.show{opacity:.9}
#bar{position:absolute;bottom:0;left:0;right:0;z-index:900;background:var(--c1);border-top:1px solid #222;padding-bottom:calc(max(env(safe-area-inset-bottom,4px),4px) + 2px)}
#stats{display:none;justify-content:center;gap:24px;padding:10px 0 6px;border-bottom:1px solid #222}
.st{text-align:center}.st-v{font-size:22px;font-weight:300;color:var(--fg);letter-spacing:.02em}.st-l{font-size:8px;font-weight:600;color:var(--dm);letter-spacing:.12em;margin-top:1px}
#ctrl{display:flex;justify-content:center;align-items:center;gap:6px;padding:8px 12px}
.cb{height:40px;border:1px solid var(--bd);border-radius:4px;background:transparent;color:var(--tx);font-size:13px;font-weight:600;letter-spacing:.06em;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center;padding:0 16px}
.cb:active{transform:scale(.95);background:var(--c2)}
.cb.stop{border-color:#c44;color:#c44;display:none}
.cb.icon{width:40px;padding:0;font-size:15px;flex-shrink:0}
.cb.icon.von{border-color:var(--g);color:var(--g)}
#tiles,.tiles-row{display:flex;justify-content:center;gap:3px;padding:4px 8px}
.tb{font-size:8px;font-weight:700;letter-spacing:.1em;padding:3px 8px;border:1px solid transparent;border-radius:2px;background:transparent;color:var(--dm);cursor:pointer;text-transform:uppercase}
.tb.on{color:var(--g);border-color:var(--bd)}
#b-c{position:absolute;right:10px;z-index:810;width:36px;height:36px;border-radius:4px;border:1px solid var(--bd);background:rgba(17,17,17,.85);color:var(--dm);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;pointer-events:auto}
#b-c:active{background:var(--c2);color:var(--g)}

/* ── History panel ── */
#hist{position:absolute;inset:0;z-index:1800;background:var(--bg);transform:translateY(100%);transition:transform .3s;overflow:hidden}
#hist.open{transform:translateY(0)}
#hist-list{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
#hist-det{position:absolute;inset:0;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateX(100%);transition:transform .25s}
#hist-det.open{transform:translateX(0)}
.hh{position:sticky;top:0;background:var(--bg);padding:14px 16px;padding-top:calc(var(--sat) + 14px);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;z-index:10}
.hh-t{font-size:14px;font-weight:600;letter-spacing:.06em}
.hh-x{font-size:18px;color:var(--dm);cursor:pointer;padding:4px 8px}
.hh-back{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--g);cursor:pointer;padding:4px 0;min-width:60px}
.he{text-align:center;padding:60px 20px;color:var(--dm);font-size:11px}
.hc{margin:8px 10px;padding:12px;border:1px solid var(--bd);border-radius:4px;cursor:pointer;display:flex;flex-direction:column;gap:4px}
.hc:active{background:var(--c2)}
.hc-top{display:flex;justify-content:space-between;align-items:center}
.hc-date{font-size:10px;color:var(--dm);font-weight:600;letter-spacing:.05em}
.hc-tag{font-size:8px;font-weight:700;letter-spacing:.1em;padding:1px 5px;border:1px solid var(--bd);border-radius:2px}
.hc-tag.r{color:var(--g);border-color:rgba(74,222,128,.3)}.hc-tag.w{color:var(--dm)}
.hc-del{font-size:12px;color:var(--dm);cursor:pointer;padding:2px 6px;margin-left:8px}
.hc-s{font-size:12px;color:var(--tx);letter-spacing:.03em}.hc-s b{color:var(--g);font-weight:500}
.hc-row{display:flex;align-items:center;justify-content:space-between}
.hc-arr{font-size:16px;color:var(--dm)}

/* ── History actions (export / import) ── */
#hist-actions{display:flex;gap:6px;padding:8px 10px;border-bottom:1px solid var(--bd);align-items:center}
.ha-btn{font-size:9px;font-weight:700;letter-spacing:.1em;padding:4px 10px;border:1px solid var(--bd);border-radius:2px;background:transparent;color:var(--dm);cursor:pointer;text-transform:uppercase;flex-shrink:0}
.ha-btn:active{background:var(--c2);color:var(--tx)}
.ha-btn.imp{color:var(--g);border-color:rgba(74,222,128,.3)}
#hist-count{font-size:9px;color:var(--dm);letter-spacing:.05em;flex:1;text-align:right}

/* ── History detail ── */
#hd-map{height:220px;background:#1a1a1a;flex-shrink:0}
#hd-info{padding:12px 10px 8px}
#hd-ctrl{padding:0 10px 10px;display:flex;gap:8px}
#hd-memo{width:calc(100% - 20px);margin:0 10px 16px;background:var(--c2);border:1px solid var(--bd);border-radius:2px;padding:6px 8px;color:var(--tx);font-size:10px;font-family:inherit;resize:vertical;min-height:32px;display:block}
#hd-memo::placeholder{color:var(--dm)}

/* ── Elevation & pace profiles ── */
#hd-prof,#hd-pace{background:var(--c2);border:1px solid var(--bd);border-radius:2px}

/* ── Loading ── */
#ld{position:absolute;inset:0;z-index:2000;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity .4s}
#ld.gone{opacity:0;pointer-events:none}
.sp{width:2px;height:2px;background:var(--g);border-radius:50%;box-shadow:12px 0 0 var(--g),-12px 0 0 var(--g);animation:ld .8s ease infinite alternate}
@keyframes ld{to{box-shadow:12px 0 0 var(--dm),-12px 0 0 var(--dm)}}
#lt{font-size:11px;color:var(--dm);text-align:center;letter-spacing:.06em;line-height:1.7}
.lr{margin-top:10px;font-size:9px;color:#555;letter-spacing:.04em;text-align:center;max-width:260px;line-height:1.6}
.lb{font-size:11px;font-weight:600;letter-spacing:.06em;padding:8px 24px;border:1px solid var(--g);border-radius:2px;background:transparent;color:var(--g);cursor:pointer;margin-top:10px}
.lb2{font-size:10px;letter-spacing:.06em;padding:6px 18px;border:1px solid var(--bd);border-radius:2px;background:transparent;color:var(--dm);cursor:pointer;margin-top:6px}
#tap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:810;pointer-events:none;display:none;font-size:11px;color:var(--dm);letter-spacing:.1em;border:1px solid var(--bd);padding:8px 16px;border-radius:2px;background:rgba(0,0,0,.8)}
.leaflet-control-attribution{font-size:7px!important;opacity:.5}
.leaflet-top{margin-top:var(--sat)!important}
.jn{width:12px;height:12px;border-radius:50%;background:var(--g);border:2px solid var(--fg);box-shadow:0 0 6px rgba(74,222,128,.4)}

/* ── マップ閲覧バー (SHOW ON MAP モード) ── */
#map-hist-bar{position:absolute;bottom:0;left:0;right:0;z-index:900;background:var(--c1);border-top:1px solid #222;padding-bottom:calc(max(env(safe-area-inset-bottom,4px),4px) + 2px);display:none}
#map-hist-ctrl{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 12px}
#map-hist-info{font-size:10px;color:var(--dm);letter-spacing:.05em;font-weight:600;flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style>
</head>
<body>
<div id="ld"><div class="sp"></div><div id="lt">...</div></div>
<div id="map"></div>
<div id="gps"><span id="gps-dot"></span><span id="gps-t"></span></div>
<div id="bgb">BG</div>
<button id="b-c" title="center">+</button>
<div id="hud"><div id="h-dir"></div><div id="h-sub"></div></div>
<div id="toast"></div>
<div id="tap">TAP TO SET POSITION</div>

<!-- ── 履歴パネル ── -->
<div id="hist">
  <!-- 一覧ビュー -->
  <div id="hist-list">
    <div class="hh">
      <span class="hh-t">LOG</span>
      <span class="hh-x" id="hx">&times;</span>
    </div>
    <div id="hist-actions">
      <button class="ha-btn" id="h-exp">↑ EXPORT</button>
      <button class="ha-btn imp" id="h-imp-btn">↓ IMPORT</button>
      <input type="file" id="h-imp-file" accept=".json" style="display:none">
      <span id="hist-count"></span>
    </div>
    <div id="hl"></div>
  </div>
  <!-- 詳細ビュー -->
  <div id="hist-det">
    <div class="hh">
      <span class="hh-back" id="hd-back">← LIST</span>
      <span class="hh-t" id="hd-title"></span>
      <span style="min-width:60px"></span>
    </div>
    <div id="hd-map"></div>
    <div id="hd-info"></div>
    <div id="hd-ctrl">
      <button class="cb icon" id="hd-hm" title="speed heatmap">~</button>
      <button class="cb icon" id="hd-ahm" title="alt heatmap">&#9650;</button>
      <button class="cb" id="hd-showmap">SHOW ON MAP</button>
      <button class="cb" id="hd-csv">CSV</button>
    </div>
    <canvas id="hd-pace" width="600" height="140" style="width:calc(100% - 20px);height:100px;margin:0 10px 2px;display:none"></canvas>
    <div id="hd-pace-label" style="display:none;padding:0 10px 6px;font-size:8px;color:var(--dm);letter-spacing:.06em;justify-content:space-between"><span id="hd-pace-l"></span><span id="hd-pace-r"></span></div>
    <canvas id="hd-prof" width="600" height="140" style="width:calc(100% - 20px);height:100px;margin:0 10px 2px;display:none"></canvas>
    <div id="hd-prof-label" style="display:none;padding:0 10px 6px;font-size:8px;color:var(--dm);letter-spacing:.06em;justify-content:space-between"><span id="hd-prof-l"></span><span id="hd-prof-r"></span></div>
    <textarea id="hd-memo" placeholder="memo"></textarea>
  </div>
</div>

<!-- ── マップ閲覧バー: SHOW ON MAP モード時のみ表示 ── -->
<div id="map-hist-bar">
  <div id="map-hist-ctrl">
    <span id="map-hist-info"></span>
    <button class="cb icon" id="map-hist-hm-btn" title="speed heatmap">~</button>
    <button class="cb icon" id="map-hist-ahm-btn" title="alt heatmap">&#9650;</button>
    <button class="cb icon" id="map-hist-log-btn" title="log">&equiv;</button>
  </div>
  <div class="tiles-row">
    <div class="tb on" data-t="std">STD</div>
    <div class="tb" data-t="dark">DARK</div>
    <div class="tb" data-t="sat">SAT</div>
    <div class="tb" data-t="pale">PALE</div>
  </div>
</div>

<div id="bar">
  <div id="stats">
    <div class="st"><div class="st-v" id="s-d">0</div><div class="st-l">M</div></div>
    <div class="st"><div class="st-v" id="s-t">0:00</div><div class="st-l">TIME</div></div>
    <div class="st"><div class="st-v" id="s-j">0</div><div class="st-l">JCT</div></div>
    <div class="st"><div class="st-v" id="s-sp">-</div><div class="st-l">KM/H</div></div>
    <div class="st"><div class="st-v" id="s-al">-</div><div class="st-l">ALT</div></div>
  </div>
  <div id="ctrl">
    <button class="cb icon" id="b-v" title="voice">V</button>
    <button class="cb" id="b-r">? RAND</button>
    <button class="cb" id="b-w">+ REC</button>
    <button class="cb stop" id="b-s">STOP</button>
    <button class="cb icon" id="b-sc" title="speed color">~</button>
    <button class="cb icon" id="b-ac" title="alt color">&#9650;</button>
    <button class="cb icon" id="b-h" title="log">&equiv;</button>
  </div>
  <div id="tiles">
    <div class="tb on" data-t="std">STD</div>
    <div class="tb" data-t="dark">DARK</div>
    <div class="tb" data-t="sat">SAT</div>
    <div class="tb" data-t="pale">PALE</div>
  </div>
</div>

<script>
// ── Capacitor Native Detection ──
let BGL=null,bglWatcherId=null;
const isNative=(typeof Capacitor!=='undefined'&&Capacitor.isNativePlatform&&Capacitor.isNativePlatform());
if(isNative){try{BGL=Capacitor.registerPlugin('BackgroundGeolocation')}catch(e){console.warn('BGL plugin not found',e)}}
// ステータスバー分のバッファを設定 (Android: 48px, Web: 0)
document.documentElement.style.setProperty('--sat',isNative?'48px':'0px');

const{sin,cos,atan2,sqrt,PI,floor,round,min,max,random:rnd}=Math,toR=d=>d*PI/180,$=id=>document.getElementById(id);
function hav(a1,o1,a2,o2){const R=6371e3,dA=toR(a2-a1),dO=toR(o2-o1),a=sin(dA/2)**2+cos(toR(a1))*cos(toR(a2))*sin(dO/2)**2;return R*2*atan2(sqrt(a),sqrt(1-a))}
function bear(a1,o1,a2,o2){const dO=toR(o2-o1);return(atan2(sin(dO)*cos(toR(a2)),cos(toR(a1))*sin(toR(a2))-sin(toR(a1))*cos(toR(a2))*cos(dO))*180/PI+360)%360}
const DA=['N','NE','E','SE','S','SW','W','NW'],AR=['\u2191','\u2197','\u2192','\u2198','\u2193','\u2199','\u2190','\u2196'];
function bD(b){const i=round(b/45)%8;return{a:AR[i],n:DA[i],i}}
function d2p(lat,lon,co){if(!co||co.length<2)return 1e9;let m=1e9;for(let i=0;i<co.length-1;i++){const a=co[i],b=co[i+1],dx=b.lat-a.lat,dy=b.lon-a.lon,l2=dx*dx+dy*dy;let t=l2?((lat-a.lat)*dx+(lon-a.lon)*dy)/l2:0;t=max(0,min(1,t));m=min(m,hav(lat,lon,a.lat+t*dx,a.lon+t*dy))}return m}
function fT(s){return`${floor(s/60)}:${(s%60).toString().padStart(2,'0')}`}
function toast(m){const e=$('toast');e.textContent=m;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),2500)}
// ファイルダウンロード/共有 (Capacitor WebView対応)
async function shareFile(blob,filename){
  // 方式1: Capacitor Filesystem + Share (ネイティブ)
  if(isNative&&typeof Capacitor!=='undefined'&&Capacitor.Plugins){
    try{
      const Fs=Capacitor.Plugins.Filesystem;
      const Sh=Capacitor.Plugins.Share;
      if(Fs&&Sh){
        const reader=new FileReader();
        const b64=await new Promise((ok,ng)=>{reader.onload=()=>ok(reader.result.split(',')[1]);reader.onerror=ng;reader.readAsDataURL(blob)});
        const r=await Fs.writeFile({path:filename,data:b64,directory:'CACHE',recursive:true});
        await Sh.share({title:filename,url:r.uri});
        return;
      }
    }catch(e){console.warn('Native share failed',e)}
  }
  // 方式2: Data URI + <a download>
  try{
    const reader=new FileReader();
    const dataUri=await new Promise((ok,ng)=>{reader.onload=()=>ok(reader.result);reader.onerror=ng;reader.readAsDataURL(blob)});
    const a=document.createElement('a');
    a.href=dataUri;a.download=filename;
    document.body.appendChild(a);a.click();
    document.body.removeChild(a);
    return;
  }catch(e){console.warn('Data URI failed',e)}
  // 方式3: Blob URL fallback
  const url=URL.createObjectURL(blob);
  window.open(url,'_blank');
  setTimeout(()=>URL.revokeObjectURL(url),5000);
}
// GPS callback helper (includes altitude)
function gpsC(p){onPos(p.coords.latitude,p.coords.longitude,p.coords.accuracy,p.coords.altitude)}

// 速度→色: HSLグラデーション 青(0)→緑(4)→黄(6)→赤(8+ km/h)
function spd2col(kmh){const t=min(max(kmh,0),8)/8;const h=240-t*240;return`hsl(${round(h)},85%,55%)`}
// 標高→色: HSLグラデーション 青(低)→緑(中)→赤(高) 相対スケール
function alt2col(alt,mn,mx){const r=mx-mn;if(r<1)return'hsl(120,85%,55%)';const t=min(max((alt-mn)/r,0),1);return`hsl(${round(240-t*240)},85%,55%)`}

// ── Voice ──
const V={on:false,m:'off',sy:window.speechSynthesis,jv:null,ev:null,ctx:null,
init(){if(!this.sy)return;const f=()=>{const v=this.sy.getVoices();this.jv=v.find(x=>x.lang.startsWith('ja'));this.ev=v.find(x=>x.lang.startsWith('en')&&x.localService)||v.find(x=>x.lang.startsWith('en'))};f();if(this.sy)this.sy.onvoiceschanged=f},
enable(){this.on=true;this.init();this.m=this.jv?'ja':this.ev?'en':this.sy?.getVoices().length?'ja':'beep';return this.m},
disable(){this.on=false;this.m='off';this.sy?.cancel()},
say(ja,en){if(!this.on)return;if(this.m==='beep'){this.beep();return}
if(!this.sy)return;if(this.sy.paused)this.sy.resume();this.sy.cancel();
const u=new SpeechSynthesisUtterance(this.m==='ja'?ja:en);u.lang=this.m==='ja'?'ja-JP':'en-US';
const v=this.m==='ja'?this.jv:this.ev;if(v)u.voice=v;u.rate=1.1;u.volume=1;this.sy.speak(u);
const ri=setInterval(()=>{if(this.sy.paused)this.sy.resume();if(!this.sy.speaking)clearInterval(ri)},300);setTimeout(()=>clearInterval(ri),8000)},
beep(){try{if(!this.ctx)this.ctx=new(window.AudioContext||window.webkitAudioContext)();if(this.ctx.state==='suspended')this.ctx.resume();const c=this.ctx,n=c.currentTime,b=(f,s,d)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.setValueAtTime(.2,n+s);g.gain.exponentialRampToValueAtTime(.01,n+s+d);o.start(n+s);o.stop(n+s+d)};b(600,0,.1);b(800,.12,.15)}catch(e){}}
};V.init();

// ── BG keep-alive ──
const BG={wl:null,au:null,ctx:null,osc:null,active:false,notif:false,gps:null,gpsFast:null,
async acquire(){if(this.active)return;this.active=true;
if('wakeLock' in navigator)try{this.wl=await navigator.wakeLock.request('screen');$('bgb').style.display=''}catch(e){}
document.addEventListener('visibilitychange',this._vc=async()=>{
  if(document.visibilityState==='visible'&&this.active){
    if('wakeLock' in navigator&&!this.wl)try{this.wl=await navigator.wakeLock.request('screen');$('bgb').style.display=''}catch(e){}
    if(this.ctx?.state==='suspended')this.ctx.resume();
    if(this.au?.paused)try{await this.au.play()}catch(e){}
    // フォアグラウンド復帰時: watcherを再アタッチして即座に位置取得
    if(!isNative&&A.wid!==null){
      navigator.geolocation.clearWatch(A.wid);
      A.wid=navigator.geolocation.watchPosition(gpsC,()=>{},{enableHighAccuracy:true,maximumAge:1000,timeout:10000});
    }
    // 即時位置取得でギャップを埋める
    if(!isNative)navigator.geolocation.getCurrentPosition(gpsC,()=>{},{enableHighAccuracy:true,maximumAge:0,timeout:8000});
  } else if(document.visibilityState==='hidden'&&this.active){
    if(!isNative)navigator.geolocation.getCurrentPosition(gpsC,()=>{},{enableHighAccuracy:true,maximumAge:0,timeout:8000});
  }
});

// ── GPS filter ──
class KF{constructor(){this.lat=null;this.lon=null;this.v=-1;this.t=0}
upd(lat,lon,a,ts){a=max(a,3);if(this.v<0){this.lat=lat;this.lon=lon;this.v=a*a;this.t=ts;return{lat,lon}}const dt=(ts-this.t)/1000;if(dt>0){this.v+=dt*2.25;this.t=ts}const K=this.v/(this.v+a*a);this.lat+=K*(lat-this.lat);this.lon+=K*(lon-this.lon);this.v*=(1-K);return{lat:this.lat,lon:this.lon}}}
class SD{constructor(){this.b=[];this.mx=15}add(lat,lon,t){this.b.push({lat,lon,t});if(this.b.length>this.mx)this.b.shift()}
mov(){if(this.b.length<4)return false;const f=this.b[0],l=this.b[this.b.length-1],d=hav(f.lat,f.lon,l.lat,l.lon),dt=(l.t-f.t)/1000;return dt>2&&d/dt>.8&&d>5}}

// ── Altitude filter (Kalman) ──
class AF{constructor(){this.a=null;this.v=-1}
upd(raw,acc){if(raw==null)return this.a;const aa=acc?acc*2.5:30;if(this.v<0){this.a=raw;this.v=aa*aa;return this.a}this.v+=0.5;const K=this.v/(this.v+aa*aa);this.a+=K*(raw-this.a);this.v*=(1-K);return this.a}}
// ── Elevation gain/loss (dead band) ──
class EG{constructor(db=3){this.db=db;this.ref=null;this.gain=0;this.loss=0}
upd(a){if(a==null)return;if(this.ref==null){this.ref=a;return}const d=a-this.ref;if(d>this.db){this.gain+=d;this.ref=a}else if(d<-this.db){this.loss+=Math.abs(d);this.ref=a}}}

// ── Road graph ──
class G{constructor(){this.N=new Map;this.A=new Map;this.WN=new Map;this.NW=new Map;this.IX=new Set;this.S=[]}
load(d){for(const e of d.elements||[])if(e.type==='node')this.N.set(e.id,{lat:e.lat,lon:e.lon});
for(const e of d.elements||[]){if(e.type!=='way'||!e.nodes)continue;const ns=e.nodes;this.WN.set(e.id,ns);for(let i=0;i<ns.length;i++){const n=ns[i];if(!this.NW.has(n))this.NW.set(n,new Set);this.NW.get(n).add(e.id);if(!this.A.has(n))this.A.set(n,new Set);if(i>0){this.A.get(n).add(ns[i-1]);if(!this.A.has(ns[i-1]))this.A.set(ns[i-1],new Set);this.A.get(ns[i-1]).add(n)}}}
for(const[n,nb]of this.A)if(nb.size>=3||nb.size===1)this.IX.add(n);for(const[n,w]of this.NW)if(w.size>=2&&this.A.has(n))this.IX.add(n);
const vi=new Set;for(const si of this.IX){const sn=this.N.get(si);if(!sn)continue;const nb=this.A.get(si);if(!nb)continue;for(const nx of nb){if(vi.has(`${si}-${nx}`))continue;const p=[si];let c=nx,pv=si,dd=0;while(c&&!this.IX.has(c)){p.push(c);const cn=this.N.get(c),pn=this.N.get(pv);if(cn&&pn)dd+=hav(pn.lat,pn.lon,cn.lat,cn.lon);const a=this.A.get(c);let n2=null;for(const x of a)if(x!==pv){n2=x;break}pv=c;c=n2}if(c&&this.IX.has(c)){p.push(c);const cn=this.N.get(c),pn=this.N.get(pv);if(cn&&pn)dd+=hav(pn.lat,pn.lon,cn.lat,cn.lon);vi.add(`${si}-${p[1]}`);vi.add(`${c}-${p[p.length-2]}`);this.S.push({f:si,t:c,co:p.map(id=>this.N.get(id)).filter(Boolean),d:round(dd)})}}}}
near(lat,lon){let b=null,bd=1e9;for(const n of this.IX){const nd=this.N.get(n);if(!nd)continue;const d=hav(lat,lon,nd.lat,nd.lon);if(d<bd){bd=d;b=n}}return b}
from(id){return this.S.filter(s=>s.f===id||s.t===id).map(s=>s.t===id?{f:s.t,t:s.f,co:[...s.co].reverse(),d:s.d}:s)}}

// ── 履歴 (IndexedDB) ──
const H={db:null,
async init(){
  return new Promise((ok,ng)=>{
    const req=indexedDB.open('sanpath',1);
    req.onupgradeneeded=e=>{e.target.result.createObjectStore('walks',{keyPath:'id'})};
    req.onsuccess=e=>{H.db=e.target.result;ok()};
    req.onerror=e=>ng(e);
  });
},
async migrate(){
  // localStorage→IndexedDB マイグレーション（初回のみ）
  try{
    const old=localStorage.getItem('osp_h');
    if(old){
      const records=JSON.parse(old);
      for(const r of records)await this.add(r);
      localStorage.removeItem('osp_h');
      console.log('Migrated',records.length,'records to IndexedDB');
    }
  }catch(e){console.warn('Migration failed',e)}
},
async load(){
  return new Promise((ok)=>{
    const tx=H.db.transaction('walks','readonly');
    const req=tx.objectStore('walks').getAll();
    req.onsuccess=()=>ok((req.result||[]).sort((a,b)=>String(b.id).localeCompare(String(a.id))));
    req.onerror=()=>ok([]);
  });
},
async add(r){
  return new Promise((ok,ng)=>{
    const tx=H.db.transaction('walks','readwrite');
    tx.objectStore('walks').put(r);
    tx.oncomplete=()=>ok();
    tx.onerror=e=>{toast('DB ERROR');ng(e)};
  });
},
async del(id){
  return new Promise((ok)=>{
    const tx=H.db.transaction('walks','readwrite');
    tx.objectStore('walks').delete(id);
    tx.oncomplete=()=>ok();
  });
},
async memo(id,t){
  const a=await this.load(),r=a.find(x=>x.id===id);
  if(r){r.memo=t;await this.add(r)}
},
async count(){
  return new Promise((ok)=>{
    const tx=H.db.transaction('walks','readonly');
    const req=tx.objectStore('walks').count();
    req.onsuccess=()=>ok(req.result);
    req.onerror=()=>ok(0);
  });
},
async render(){
  const a=await this.load(),el=$('hl');
  if(!a.length){el.innerHTML='<div class="he">NO DATA</div>';return}
  el.innerHTML=a.map(r=>`
    <div class="hc" data-sh="${r.id}">
      <div class="hc-top">
        <span class="hc-date">${r.date}</span>
        <span class="hc-tag ${r.mode==='rand'?'r':'w'}">${r.mode==='rand'?'RAND':'REC'}</span>
        <span class="hc-del" data-d="${r.id}">&times;</span>
      </div>
      <div class="hc-row">
        <span class="hc-s"><b>${r.dist}</b>m &nbsp; ${r.dur} &nbsp; <b>${r.junc}</b> jct</span>
        <span class="hc-arr">›</span>
      </div>
    </div>`).join('');
  el.querySelectorAll('[data-d]').forEach(b=>b.onclick=async(e)=>{e.stopPropagation();await H.del(b.dataset.d);await H.render()});
  el.querySelectorAll('[data-sh]').forEach(card=>card.onclick=async()=>{
    const r=(await H.load()).find(x=>x.id===card.dataset.sh);
    if(r)openHistDet(r);
  });
}};

// ── エクスポート / インポート ──
const IO={
  async export(){
    const records=await H.load();
    if(!records.length){toast('NO DATA');return;}
    const payload={version:1,exported:new Date().toISOString(),count:records.length,records};
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    const ts=new Date().toLocaleString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).replace(/[\/:]/g,'-').replace(/\s/g,'_');
    await shareFile(blob,`sanpath_${ts}.json`);
    toast(`${records.length} EXPORTED`);
  },
  import(file){
    if(!file)return;
    const reader=new FileReader();
    reader.onload=async e=>{
      try{
        const data=JSON.parse(e.target.result);
        const incoming=Array.isArray(data)?data:(data.records||[]);
        if(!incoming.length){toast('NO DATA');return;}
        const existing=await H.load();
        const existIds=new Set(existing.map(r=>r.id));
        const newRecs=incoming.filter(r=>r&&r.id&&!existIds.has(r.id));
        if(!newRecs.length){toast('NO NEW DATA');return;}
        for(const r of newRecs)await H.add(r);
        await H.render();
        await updateHistCount();
        await renderAllHistRoutes();
        toast(`${newRecs.length} IMPORTED`);
      }catch(err){toast('JSON ERROR')}
    };
    reader.readAsText(file,'UTF-8');
  }
};

}

  stopAltFetcher();

  // ── 標高の一括線形補間 ──
  // APIで取得した値(non-null)の間のnullポイントを補間
  const wc=A.wc;
  // 既知の標高ポイントのインデックスを収集
  const known=[];
  for(let i=0;i<wc.length;i++){if(wc[i][3]!=null)known.push(i)}
  if(known.length>=2){
    // 先頭のnull群を最初の既知値で埋める
    for(let i=0;i<known[0];i++)wc[i][3]=wc[known[0]][3];
    // 末尾のnull群を最後の既知値で埋める
    for(let i=known[known.length-1]+1;i<wc.length;i++)wc[i][3]=wc[known[known.length-1]][3];
    // 既知値間のnullを線形補間
    for(let k=0;k<known.length-1;k++){
      const i0=known[k],i1=known[k+1];
      const v0=wc[i0][3],v1=wc[i1][3];
      for(let i=i0+1;i<i1;i++){
        const t=(i-i0)/(i1-i0);
        wc[i][3]=+(v0+(v1-v0)*t).toFixed(1);
      }
    }
  }else if(known.length===1){
    // 1つしかない場合は全ポイントに同じ値
    for(let i=0;i<wc.length;i++)wc[i][3]=wc[known[0]][3];
  }

  // 標高指標を再計算（補間後のデータで）
  const alts=wc.map(p=>p[3]).filter(v=>v!=null);
  let elev=null;
  if(alts.length>1){
    const eg=new EG(1);alts.forEach(a=>eg.upd(a));
    elev={corrected:true,source:'GSI',
      gain:round(eg.gain),loss:round(eg.loss),
      max:round(Math.max(...alts)),min:round(Math.min(...alts)),
      start:round(alts[0]),end:round(alts[alts.length-1]),
      correctedPath:null};
  }

  // パス圧縮
  let savePath=wc.map(p=>[
    +p[0].toFixed(5),+p[1].toFixed(5),
    p[2]!=null?+p[2].toFixed(1):0,
    p[3]!=null?+p[3].toFixed(1):null,
    p[4]||0
  ]);
  // ダウンサンプリング（10000ポイント超なら間引く）
  if(savePath.length>10000){
    const n=Math.ceil(savePath.length/10000);
    const ds=[savePath[0]];
    for(let i=n;i<savePath.length-1;i+=n)ds.push(savePath[i]);
    ds.push(savePath[savePath.length-1]);
    savePath=ds;
  }
  await H.add({id:Date.now().toString(36)+round(rnd()*1e4).toString(36),
    date:new Date().toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}),
    dist:round(A.td),junc:A.jc,dur,
    path:savePath,
    memo:'',mode:A.mode,elev});
  A.st='IDLE';if(A.tv)clearInterval(A.tv);if(A.si)clearInterval(A.si);
  [A.pl,A.nm,A.npl,A.nnm].forEach(x=>{if(x)A.map.removeLayer(x)});A.pl=A.nm=A.npl=A.nnm=A.ns=null;
  A.jm.forEach(m=>A.map.removeLayer(m));A.jm=[];A.vm.forEach(m=>A.map.removeLayer(m));A.vm=[];A.vis.clear();A.cf=A.cs=null;
  uiIdle();rstBtn();if(A.manual)$('tap').style.display='';
  V.say(`${round(A.td)}m`,`${round(A.td)} meters`);BG.release();
  toast(`${round(A.td)}m / ${dur}`);
  await renderAllHistRoutes();
}

function pick(from,came){const s=A.g.from(from);let c=s.filter(x=>!A.vis.has(x.t));if(!c.length)c=s.filter(x=>x.t!==came);if(!c.length)c=s;let g=c.filter(x=>x.d>20);if(g.length)c=g;return c.length?c[floor(rnd()*c.length)]:null}
function startR(){A.vis.add(A.ci);mV(A.ci);const s=pick(A.ci,A.cf);if(!s){toast('ALL EXPLORED');stop();return}goS(s);preC()}
function preC(){if(!A.ti){A.ns=null;return}const tv=A.vis.has(A.ti);A.vis.add(A.ti);A.ns=pick(A.ti,A.ci);if(!tv)A.vis.delete(A.ti);
if(A.npl)A.map.removeLayer(A.npl);if(A.nnm)A.map.removeLayer(A.nnm);A.npl=A.nnm=null;

const nn=A.g.N.get(A.ns.t);if(nn){const ic=L.divIcon({className:'',html:'<div style="width:6px;height:6px;border-radius:50%;background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.25)"></div>',iconSize:[6,6],iconAnchor:[3,3]});A.nnm=L.marker([nn.lat,nn.lon],{icon:ic,interactive:false}).addTo(A.map)}}}
function goS(seg){A.cs=seg;A.cf=A.ci;A.ti=seg.t;A.jc++;A.swd=0;A.lat=Date.now();A.aa=false;$('s-j').textContent=A.jc;
if(A.pl)A.map.removeLayer(A.pl);A.pl=L.polyline(seg.co.map(c=>[c.lat,c.lon]),{color:'#4ade80',weight:3,opacity:.5,dashArray:'6,5'}).addTo(A.map);
if(A.nm)A.map.removeLayer(A.nm);const tn=A.g.N.get(seg.t);if(tn){const ic=L.divIcon({className:'',html:'<div class="jn"></div>',iconSize:[12,12],iconAnchor:[6,6]});A.nm=L.marker([tn.lat,tn.lon],{icon:ic}).addTo(A.map)}
uDir();const sn=A.g.N.get(seg.f),np=seg.co.length>1?seg.co[1]:A.g.N.get(seg.t);
if(sn&&np){const d=bD(bear(sn.lat,sn.lon,np.lat,np.lon));V.say(`${d.n} ${seg.d}m`,`${d.n} ${seg.d}m`);BG.ms(`${d.a} ${d.n} ${seg.d}m`);BG.notify(d.a+' '+d.n,seg.d+'m');BG.vib([80,40,80,40,160])}
if(A.sim||A.manual)startSim(seg)}
function onA(now){A.vis.add(A.ti);mV(A.ti);V.say('JCT','Arrived');BG.vib([80,60,80,60,200]);
[A.pl,A.nm,A.npl,A.nnm].forEach(x=>{if(x)A.map.removeLayer(x)});A.pl=A.nm=A.npl=A.nnm=null;
A.ci=A.ti;A.lat=now;const s=A.ns||pick(A.ci,A.cf);A.ns=null;if(!s){toast('ALL EXPLORED');stop();return}goS(s);preC()}
function onD(nid,now){A.vis.add(nid);mV(nid);V.say('REROUTE','Recalculating');BG.vib([200,80,200]);
[A.pl,A.nm,A.npl,A.nnm].forEach(x=>{if(x)A.map.removeLayer(x)});A.pl=A.nm=A.npl=A.nnm=null;A.ns=null;
A.ci=nid;A.cf=null;A.lat=now;A.jc++;$('s-j').textContent=A.jc;
const s=pick(nid,null);if(!s){stop();return}goS(s);preC()}
function mV(n){const nd=A.g.N.get(n);if(!nd)return;const ic=L.divIcon({className:'',html:'<div style="width:5px;height:5px;border-radius:50%;background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.2)"></div>',iconSize:[5,5],iconAnchor:[2,2]});A.vm.push(L.marker([nd.lat,nd.lon],{icon:ic,interactive:false,zIndexOffset:-100}).addTo(A.map))}
function uDir(){if(!A.cs||!A.fp)return;const t=A.g.N.get(A.ti);if(!t)return;const dist=hav(A.fp.lat,A.fp.lon,t.lat,t.lon),d=bD(bear(A.fp.lat,A.fp.lon,t.lat,t.lon));

$('h-sub').textContent=sub;
if(!A.aa&&dist<40&&A.swd>10){A.aa=true;V.say(`${round(dist)}m`,`${round(dist)} meters`);BG.vib([150,80,150,80,150])}
BG.ms(`${d.a} ${d.n} ${round(dist)}m`)}

// ── REC mode junction detection ──
function chkRecJct(lat,lon){
  if(!A.g||!A.g.IX.size)return;
  const now=Date.now();if(now-A._lastJctCheck<3000)return;A._lastJctCheck=now;
  for(const nid of A.g.IX){
    if(A._recPassedJct.has(nid))continue;
    if((A.g.A.get(nid)?.size||0)<3)continue;
    const nd=A.g.N.get(nid);if(!nd)continue;
    if(hav(lat,lon,nd.lat,nd.lon)<20){A._recPassedJct.add(nid);A.jc++;$('s-j').textContent=A.jc}
  }
}

// ── Arrival check (RAND) ──
function chk(lat,lon,now,mv){if(!mv||A.st!=='WALK'||A.mode!=='rand')return;if(now-A.lat<5000)return;
const t=A.g.N.get(A.ti);if(t){const d=hav(lat,lon,t.lat,t.lon),sl=A.cs?.d||999;if(d<25&&(A.swd>sl*.35||sl<30)){A.st='ARR';onA(now);return}}
if(A.swd<20||!A.cs)return;if(d2p(lat,lon,A.cs.co)<50)return;
const skip=new Set([A.ci,A.ti,A.cf]);if(A.ns)skip.add(A.ns.t);
for(const nid of A.g.IX){if(skip.has(nid))continue;const nd=A.g.N.get(nid);if(!nd)continue;if(hav(lat,lon,nd.lat,nd.lon)<25){A.st='ARR';onD(nid,now);return}}}

// ── GPS位置更新 ──
// A.wc は [lat, lon, kmh, alt, elapsedSec] で管理 (altはAPI取得、初期null)
function onPos(rl,ro,acc,alt){
  const now=Date.now();
  if(now-A.lastG<600)return;
  A.lastG=now;
  const eSec=A.t0?round((now-A.t0)/1000):0;

  // シミュレーション/マニュアルモード
  if(A.sim||A.manual){
    A.fp={lat:rl,lon:ro};A.um.setLatLng([rl,ro]);A.uc.setLatLng([rl,ro]);A.uc.setRadius(5);
    const l=A.wc[A.wc.length-1];
    if(l){
      const d=hav(l[0],l[1],rl,ro);
      if(d>1){
        A.td+=d;A.swd+=d;$('s-d').textContent=round(A.td);
        const dt=(now-(A._lastPosTime||now))*0.001,kmh=dt>0?d/dt*3.6:0;
        $('s-sp').textContent=isFinite(kmh)?kmh.toFixed(1):'-';
        A.wc.push([rl,ro,kmh,null,eSec]);
        if(A.spdCol)addSpdSeg(l[0],l[1],rl,ro,kmh);
        else if(!A.altCol)A.wl.addLatLng([rl,ro]);
      }
    } else {
      A.wc.push([rl,ro,0,null,eSec]);
    }
    A._lastPosTime=now;
    if(A.st==='WALK'){if(A.mode==='rand')uDir();if(A.mode==='rec')chkRecJct(rl,ro);chk(rl,ro,now,true);A.map.panTo([rl,ro],{animate:true,duration:.3})}
    return;
  }

  // 通常GPSモード
  acc=acc||100;uGPS(acc);if(acc>(A.st==='WALK'?200:80))return;
  const f=A.kf.upd(rl,ro,acc,now);
  A.fp={lat:f.lat,lon:f.lon};
  A.um.setLatLng([f.lat,f.lon]);A.uc.setLatLng([f.lat,f.lon]);A.uc.setRadius(max(acc,8));
  A.sd.add(f.lat,f.lon,now);
  const mv=A.sd.mov();
  const l=A.wc[A.wc.length-1];
  const allowAdd=A.st==='WALK'||mv;

  if(allowAdd&&l){
    const d=hav(l[0],l[1],f.lat,f.lon);
    const dMax=A.st==='WALK'?500:30;
    if(d>2&&d<dMax){
      A.td+=d;A.swd+=d;$('s-d').textContent=round(A.td);
      const dt=(now-(A._lastPosTime||now))/1000;
      const kmh=(dt>0&&dt<60)?d/dt*3.6:0;
      $('s-sp').textContent=kmh>0?kmh.toFixed(1):'-';
      A.wc.push([f.lat,f.lon,kmh,null,eSec]);
      if(A.spdCol)addSpdSeg(l[0],l[1],f.lat,f.lon,kmh);
      else if(!A.altCol)A.wl.addLatLng([f.lat,f.lon]);
    }
  } else if(!l&&A.st==='WALK'){
    A.wc.push([f.lat,f.lon,0,null,eSec]);
    if(!A.spdCol&&!A.altCol)A.wl.addLatLng([f.lat,f.lon]);
  } else if(!l){
    A.wc.push([f.lat,f.lon,0,null,eSec]);
  }
  A._lastPosTime=now;
  if(A.st==='WALK'){if(A.mode==='rand')uDir();if(A.mode==='rec')chkRecJct(f.lat,f.lon);chk(f.lat,f.lon,now,mv);A.map.panTo([f.lat,f.lon],{animate:true,duration:.5})}
}

// ── リアルタイム標高APIフェッチャー ──
// 8秒間隔で現在地の標高を国土地理院APIから取得
// 取得時にnullの過去ポイントをバックフィル（線形補間）
let _altFetchTimer=null,_altFetchBusy=false,_altLastDist=0,_altLastIdx=-1,_altLastVal=null;
function startAltFetcher(){
  _altLastDist=0;_altLastIdx=-1;_altLastVal=null;
  _altFetchTimer=setInterval(async()=>{
    if(!A.fp||A.st!=='WALK'||_altFetchBusy)return;
    if(A.td-_altLastDist<5)return;
    _altFetchBusy=true;
    try{
      const res=await fetch(`https://cyberjapandata2.gsi.go.jp/general/dem/scripts/getelevation.php?lon=${A.fp.lon}&lat=${A.fp.lat}&outtype=JSON`);
      const d=await res.json();
      if(d.elevation!=null&&d.elevation!=='-----'){
        const elv=parseFloat(d.elevation);
        const curIdx=A.wc.length-1;
        // バックフィル: 前回取得ポイント〜今回の間のnullポイントを線形補間
        if(_altLastIdx>=0&&_altLastVal!=null&&curIdx>_altLastIdx){
          const span=curIdx-_altLastIdx;
          for(let i=_altLastIdx+1;i<=curIdx;i++){
            if(A.wc[i]&&A.wc[i][3]==null){
              const t=(i-_altLastIdx)/span;
              A.wc[i][3]=+(_altLastVal+(elv-_altLastVal)*t).toFixed(1);
            }
          }
        }else if(curIdx>=0){
          // 初回: 現在のポイントに書き込み
          A.wc[curIdx][3]=elv;
        }
        _altLastIdx=curIdx;_altLastVal=elv;
        A.elevG.upd(elv);
        $('s-al').textContent=round(elv)+'m';
        _altLastDist=A.td;
      }
    }catch(e){}
    _altFetchBusy=false;
  },8000);
}
function stopAltFetcher(){if(_altFetchTimer){clearInterval(_altFetchTimer);_altFetchTimer=null}}

function startSim(seg){if(A.si)clearInterval(A.si);let i=0;const co=seg.co;A.si=setInterval(()=>{i++;if(i>=co.length){clearInterval(A.si);A.si=null;onPos(co[co.length-1].lat,co[co.length-1].lon,null,null);return}const a=co[i-1],b=co[i];let s=0;const mi=setInterval(()=>{s++;const t=s/5;onPos(a.lat+(b.lat-a.lat)*t,a.lon+(b.lon-a.lon)*t,null,null);if(s>=5)clearInterval(mi)},6)},120)}
function uTime(){if(!A.t0)return;$('s-t').textContent=fT(floor((Date.now()-A.t0)/1000))}

// ── SHOW ON MAP: 経路をメインマップで全画面閲覧 ──
function clearMapHistLayers(){
  A.mapHistLayers.forEach(l=>A.map.removeLayer(l));
  A.mapHistLayers=[];
}

function drawMapHistRoute(r,useHm){
  clearMapHistLayers();
  if(!r.path||!r.path.length)return;
  const ll=r.path.map(p=>[p[0],p[1]]);
  const hasSpd=r.path[0].length>2;
  if(useHm&&hasSpd){
    for(let i=1;i<r.path.length;i++){
      const a=r.path[i-1],b=r.path[i],kmh=b[2]||0;
      A.mapHistLayers.push(L.polyline([[a[0],a[1]],[b[0],b[1]]],{color:spd2col(kmh),weight:3.5,opacity:.85}).addTo(A.map));
    }
  } else {
    A.mapHistLayers.push(L.polyline(ll,{color:'#4ade80',weight:3,opacity:.8}).addTo(A.map));
  }
  // スタート・エンドマーカー
  if(ll.length>0){
    const sIc=L.divIcon({className:'',html:'<div style="width:12px;height:12px;border-radius:50%;border:2.5px solid #4ade80;background:transparent"></div>',iconSize:[12,12],iconAnchor:[6,6]});
    A.mapHistLayers.push(L.marker(ll[0],{icon:sIc,interactive:false,zIndexOffset:500}).addTo(A.map));
    if(ll.length>1){
      const eIc=L.divIcon({className:'',html:'<div style="width:10px;height:10px;border-radius:50%;background:#4ade80"></div>',iconSize:[10,10],iconAnchor:[5,5]});
      A.mapHistLayers.push(L.marker(ll[ll.length-1],{icon:eIc,interactive:false,zIndexOffset:500}).addTo(A.map));
    }
  }
  if(ll.length>1)A.map.fitBounds(L.latLngBounds(ll).pad(.15));
  else if(ll.length===1)A.map.setView(ll[0],17);
}

function renderHdRoute(r,useHm){
  if(!HD.map||!r.path||!r.path.length)return;
  // 既存の経路レイヤーを削除
  HD.segs.forEach(s=>HD.map.removeLayer(s));HD.segs=[];
  if(HD.routeLayer){HD.map.removeLayer(HD.routeLayer);HD.routeLayer=null;}
  const ll=r.path.map(p=>[p[0],p[1]]);
  const hasSpd=r.path[0].length>2;

  if(useHm&&hasSpd){
    // ヒートマップ: 速度ごとに色付きセグメントを描画
    for(let i=1;i<r.path.length;i++){
      const a=r.path[i-1],b=r.path[i],kmh=b[2]||0;
      HD.segs.push(L.polyline([[a[0],a[1]],[b[0],b[1]]],{color:spd2col(kmh),weight:3,opacity:.8}).addTo(HD.map));

  } else {

// ══════ Phase E: 標高プロファイル描画 ══════
function drawElevProfile(r){
  const canvas=$('hd-prof');
  const lbl=$('hd-prof-label');
  const ll=$('hd-prof-l'),lr=$('hd-prof-r');
  if(!r||!r.path||r.path.length<2){canvas.style.display='none';lbl.style.display='none';return}

  // 標高データ取得 (補正済み優先)
  const ev=r.elev;
  let alts;
  if(ev&&ev.correctedPath&&ev.correctedPath.length===r.path.length){
    alts=ev.correctedPath;
  }else{
    alts=r.path.map(p=>p.length>3?p[3]:null);
  }
  const validAlts=alts.map((a,i)=>a!=null?{i,a}:null).filter(Boolean);
  if(validAlts.length<2){canvas.style.display='none';lbl.style.display='none';return}

  // 累積距離を計算
  const cumDist=[0];
  for(let i=1;i<r.path.length;i++){
    cumDist.push(cumDist[i-1]+hav(r.path[i-1][0],r.path[i-1][1],r.path[i][0],r.path[i][1]));
  }
  const totalDist=cumDist[cumDist.length-1];
  const mn=ev?ev.min:round(Math.min(...validAlts.map(v=>v.a)));
  const mx=ev?ev.max:round(Math.max(...validAlts.map(v=>v.a)));
  const range=mx-mn||1;

  canvas.style.display='block';lbl.style.display='flex';
  const dpr=window.devicePixelRatio||1;
  const w=canvas.clientWidth*dpr,h=canvas.clientHeight*dpr;
  canvas.width=w;canvas.height=h;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,w,h);
  const pad={t:8*dpr,b:4*dpr,l:2*dpr,r:2*dpr};
  const pw=w-pad.l-pad.r,ph=h-pad.t-pad.b;

  // 全ポイントのxy座標
  const pts=[];
  for(let i=0;i<r.path.length;i++){
    const a=alts[i];
    if(a==null)continue;
    const x=pad.l+(totalDist>0?cumDist[i]/totalDist:i/(r.path.length-1))*pw;
    const y=pad.t+ph-(a-mn)/range*ph;
    pts.push({x,y,a});
  }
  if(pts.length<2)return;

  // 塗りつぶし
  ctx.beginPath();
  ctx.moveTo(pts[0].x,pad.t+ph);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,pad.t+ph);
  ctx.closePath();
  ctx.fillStyle='rgba(74,222,128,0.12)';ctx.fill();

  // ライン
  ctx.beginPath();
  pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.strokeStyle=ev&&ev.corrected?'#4ade80':'rgba(74,222,128,0.5)';
  ctx.lineWidth=1.5*dpr;
  if(!ev||!ev.corrected)ctx.setLineDash([3*dpr,3*dpr]);
  ctx.stroke();ctx.setLineDash([]);

  // ラベル
  ll.textContent=`${mn}m`;
  lr.textContent=`${mx}m`;
}

// ══════ ペースプロファイル描画 ══════
function drawPaceProfile(r){
  const canvas=$('hd-pace');
  const lbl=$('hd-pace-label');
  const pl=$('hd-pace-l'),pr=$('hd-pace-r');
  if(!r||!r.path||r.path.length<3){canvas.style.display='none';lbl.style.display='none';return}

  // 速度データ取得
  const speeds=r.path.map(p=>p.length>2?p[2]:null);
  const validSpds=speeds.filter(v=>v!=null&&v>0);
  if(validSpds.length<2){canvas.style.display='none';lbl.style.display='none';return}

  // 累積距離
  const cumDist=[0];
  for(let i=1;i<r.path.length;i++){
    cumDist.push(cumDist[i-1]+hav(r.path[i-1][0],r.path[i-1][1],r.path[i][0],r.path[i][1]));
  }
  const totalDist=cumDist[cumDist.length-1];
  const mnS=Math.min(...validSpds),mxS=Math.max(...validSpds);
  const rangeS=mxS-mnS||1;

  canvas.style.display='block';lbl.style.display='flex';
  const dpr=window.devicePixelRatio||1;
  const w=canvas.clientWidth*dpr,h=canvas.clientHeight*dpr;
  canvas.width=w;canvas.height=h;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,w,h);
  const pad={t:8*dpr,b:4*dpr,l:2*dpr,r:2*dpr};
  const pw=w-pad.l-pad.r,ph=h-pad.t-pad.b;

  // ポイント座標
  const pts=[];
  for(let i=0;i<r.path.length;i++){
    const s=speeds[i];
    if(s==null||s<=0)continue;
    const x=pad.l+(totalDist>0?cumDist[i]/totalDist:i/(r.path.length-1))*pw;
    const y=pad.t+ph-(s-mnS)/rangeS*ph;
    pts.push({x,y,s});
  }
  if(pts.length<2)return;

  // 塗りつぶし（HSLグラデーション）
  ctx.beginPath();
  ctx.moveTo(pts[0].x,pad.t+ph);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,pad.t+ph);
  ctx.closePath();
  ctx.fillStyle='rgba(100,180,255,0.1)';ctx.fill();

  // 速度に応じた色でセグメント描画
  ctx.lineWidth=1.5*dpr;
  for(let i=1;i<pts.length;i++){
    ctx.beginPath();
    ctx.moveTo(pts[i-1].x,pts[i-1].y);
    ctx.lineTo(pts[i].x,pts[i].y);
    ctx.strokeStyle=spd2col(pts[i].s);
    ctx.stroke();
  }

  // ラベル
  pl.textContent=`${mnS.toFixed(1)}km/h`;
  pr.textContent=`${mxS.toFixed(1)}km/h`;
}

// ══════ Phase F: CSV出力 ══════
async function exportCSV(r){
  if(!r||!r.path||!r.path.length){toast('NO DATA');return}
  const ev=r.elev;
  const hasCorr=ev&&ev.correctedPath&&ev.correctedPath.length===r.path.length;
  // 累積距離
  const cumDist=[0];
  for(let i=1;i<r.path.length;i++){
    cumDist.push(cumDist[i-1]+hav(r.path[i-1][0],r.path[i-1][1],r.path[i][0],r.path[i][1]));
  }
  // ヘッダコメント
  const lines=[
    `# Sanpath Walk Record`,
    `# Date: ${r.date}`,
    `# Mode: ${r.mode==='rand'?'RAND':'REC'}`,
    `# Distance: ${r.dist}m`,
    `# Duration: ${r.dur}`,
    `# Junctions: ${r.junc}`,
  ];
  if(ev){
    lines.push(`# Elevation Gain: ${ev.gain}m (${ev.corrected?ev.source:'GPS'})`);
    lines.push(`# Elevation Loss: ${ev.loss}m (${ev.corrected?ev.source:'GPS'})`);
    lines.push(`# Elevation Range: ${ev.min}-${ev.max}m`);
  }
  lines.push(`# Points: ${r.path.length}`);
  lines.push('index,lat,lon,speed_kmh,altitude_gps_m,altitude_corrected_m,distance_cumulative_m,time_elapsed_s');

  for(let i=0;i<r.path.length;i++){
    const p=r.path[i];
    const lat=p[0].toFixed(5);
    const lon=p[1].toFixed(5);
    const spd=p.length>2&&p[2]!=null?p[2].toFixed(1):'';
    const altGps=p.length>3&&p[3]!=null?p[3].toFixed(1):'';
    const altCorr=hasCorr&&ev.correctedPath[i]!=null?ev.correctedPath[i].toFixed(1):'';
    const dist=round(cumDist[i]);
    const sec=p.length>4&&p[4]!=null?p[4]:'';
    lines.push(`${i},${lat},${lon},${spd},${altGps},${altCorr},${dist},${sec}`);
  }

  const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const ts=r.date.replace(/[\/:]/g,'-').replace(/\s/g,'_');
  await shareFile(blob,`sanpath_${ts}.csv`);
  toast(`CSV ${r.path.length} pts`);
}

// ══════ 標高ヒートマップ for 履歴詳細 ══════
function renderHdRouteAlt(r){
  if(!HD.map||!r.path||r.path.length<2)return;
  HD.segs.forEach(s=>HD.map.removeLayer(s));HD.segs=[];
  if(HD.routeLayer){HD.map.removeLayer(HD.routeLayer);HD.routeLayer=null}
  const ev=r.elev;
  const alts=ev&&ev.correctedPath?ev.correctedPath:r.path.map(p=>p.length>3?p[3]:null);
  const valid=alts.filter(v=>v!=null);
  if(valid.length<2){toast('NO ALT DATA');return}
  const mn=Math.min(...valid),mx=Math.max(...valid);
  const ll=r.path.map(p=>[p[0],p[1]]);
  for(let i=1;i<r.path.length;i++){
    const alt=alts[i];if(alt==null)continue;
    HD.segs.push(L.polyline([[r.path[i-1][0],r.path[i-1][1]],[r.path[i][0],r.path[i][1]]],{color:alt2col(alt,mn,mx),weight:3,opacity:.8}).addTo(HD.map));
  }
  // start/end markers
  if(ll.length>0){
    const sIc=L.divIcon({className:'',html:'<div style="width:8px;height:8px;border-radius:50%;border:2px solid #4ade80;background:transparent"></div>',iconSize:[8,8],iconAnchor:[4,4]});
    HD.segs.push(L.marker(ll[0],{icon:sIc,interactive:false}).addTo(HD.map));
    if(ll.length>1){const eIc=L.divIcon({className:'',html:'<div style="width:8px;height:8px;border-radius:50%;background:#4ade80"></div>',iconSize:[8,8],iconAnchor:[4,4]});
    HD.segs.push(L.marker(ll[ll.length-1],{icon:eIc,interactive:false}).addTo(HD.map))}
  }
  if(ll.length>1)HD.map.fitBounds(L.latLngBounds(ll).pad(.15));
}

async function startGPS(){
  if(isNative&&BGL){
    bglWatcherId=await BGL.addWatcher(
      {backgroundMessage:'Sanpath: tracking',backgroundTitle:'Sanpath',requestPermissions:true,stale:false,distanceFilter:3},
      function(loc,err){if(err){if(err.code==='NOT_AUTHORIZED'&&confirm('Location permission required'))BGL.openSettings();return}
        onPos(loc.latitude,loc.longitude,loc.accuracy,loc.altitude);}
    );
  }else{
    A.wid=navigator.geolocation.watchPosition(gpsC,()=>{},{enableHighAccuracy:true,maximumAge:1000,timeout:10000});
  }
}
async function stopGPS(){
  if(isNative&&BGL&&bglWatcherId!=null){await BGL.removeWatcher({id:bglWatcherId});bglWatcherId=null}
  if(A.wid!=null){navigator.geolocation.clearWatch(A.wid);A.wid=null}

function initM(lat,lon){A.manual=true;A.fp={lat,lon};initMap(lat,lon);A.map.setZoom(16);$('tap').style.display='';$('ld').classList.add('gone');A.st='READY';
A.map.on('click',e=>{A.fp={lat:e.latlng.lat,lon:e.latlng.lng};A.um.setLatLng(e.latlng);A.uc.setLatLng(e.latlng);A.map.panTo(e.latlng);$('tap').style.display='none'})}
async function boot(){const lt=$('lt');
// IndexedDB初期化 + localStorageからのマイグレーション
try{await H.init();await H.migrate()}catch(e){console.error('DB init failed',e)}
if(!('geolocation' in navigator)||(typeof window.isSecureContext!=='undefined'&&!window.isSecureContext)){lt.textContent='NO GPS';manFB();return}
lt.textContent='GPS...';
try{const p=await new Promise((ok,ng)=>{let best=null,ba=1e4,n=0;const w=navigator.geolocation.watchPosition(p=>{n++;const a=p.coords.accuracy;lt.textContent=`${round(a)}m (${n})`;if(a<ba){ba=a;best=p}if(a<=30||n>=8){navigator.geolocation.clearWatch(w);ok(best||p)}},e=>{navigator.geolocation.clearWatch(w);ng(e)},{enableHighAccuracy:true,maximumAge:0,timeout:15000});setTimeout(()=>{navigator.geolocation.clearWatch(w);best?ok(best):ng(Error('t'))},16000)});
const lat=p.coords.latitude,lon=p.coords.longitude,acc=p.coords.accuracy;
A.kf.upd(lat,lon,acc,Date.now());A.fp={lat,lon};initMap(lat,lon);uGPS(acc);
startGPS();
$('ld').classList.add('gone');A.st='READY'}catch(e){lt.textContent='GPS FAIL';manFB()}}
function manFB(){const p=$('lt').parentElement;
const r=document.createElement('div');r.className='lr';r.textContent='HTTPS / PERMISSION REQUIRED';p.appendChild(r);
const b=document.createElement('button');b.className='lb';b.textContent='MANUAL MODE';b.onclick=()=>initM(35.6284,139.7387);p.appendChild(b);
const rb=document.createElement('button');rb.className='lb2';rb.textContent='RETRY';rb.onclick=()=>{r.remove();b.remove();rb.remove();$('lt').textContent='...';boot()};p.appendChild(rb)}
